<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Books of Heroes — Tu es le héros</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,900&family=Lora:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@500;600&family=Lexend:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#EAE0C6;
  --paper:#F8F1DF;
  --ink:#241A12;
  --ink-soft:#6B5A47;
  --line-hair:#D6C69C;
  --l6e:#6B1F2A;
  --l5e:#1B4332;
  --l4e:#16223D;
  --l3e:#7A4B26;
  --gold:#B8912E;
  --gold-light:#E9D9A8;
  --wood-hi:#6B4226;
  --wood-lo:#3B2415;
  --good:#1E7A46;
  --warn:#B5651D;
  --radius:10px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:var(--bg);
  color:var(--ink);
  font-family:'Lora',Georgia,serif;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
body.dys, body.dys .page-text, body.dys .choice-btn, body.dys .ending-title{
  font-family:'Lexend',Verdana,Arial,sans-serif !important;
}
body.dys .page-text{letter-spacing:0.01em;}
body.contrast{
  --bg:#0F1220;
  --paper:#1B1F33;
  --ink:#FBF8F1;
  --ink-soft:#C9CEDC;
  --line-hair:#3A3F5C;
}
body.letterspace .page-text{letter-spacing:0.09em;word-spacing:0.18em;}
body.linespace .page-text{line-height:2.15;}
body.bionic-off b{font-weight:inherit;}
.overlay-cream .page-card{background:var(--paper) !important;}
.overlay-blue .page-card{background:#E9F1F7 !important;}
.overlay-yellow .page-card{background:#FBF6D9 !important;}
.overlay-grey .page-card{background:#EAEAEA !important;}
h1,h2,h3,.disp{
  font-family:'Fraunces',Arial,sans-serif;
  font-weight:700;
  letter-spacing:-0.01em;
  margin:0;
}
.mono{font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:0.02em;}
button{font-family:inherit;cursor:pointer;}
.app{max-width:640px;margin:0 auto;padding:0 0 60px;min-height:100vh;position:relative;}

/* ---------- topbar ---------- */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px 12px;
  position:sticky;top:0;background:var(--bg);z-index:20;
  border-bottom:1px solid var(--line-hair);
}
.brand{display:flex;align-items:center;gap:8px;}
.brand-mark{
  width:30px;height:30px;border-radius:50%;
  background:var(--ink);color:var(--bg);
  display:flex;align-items:center;justify-content:center;font-size:15px;
  flex:none;
}
.brand-name{font-size:18px;}
.topbar-actions{display:flex;gap:8px;}
.icon-btn{
  width:36px;height:36px;border-radius:50%;
  border:1px solid var(--line-hair);background:var(--paper);
  color:var(--ink);font-size:15px;display:flex;align-items:center;justify-content:center;
}
.icon-btn.active{background:var(--ink);color:var(--bg);border-color:var(--ink);}
#dysToggle{
  width:auto;min-width:36px;height:36px;border-radius:18px;padding:0 12px;
  font-family:'IBM Plex Mono';font-size:12px;font-weight:600;letter-spacing:0.03em;
}

/* ---------- dys panel ---------- */
.dys-panel{
  display:none;padding:14px 18px 18px;background:var(--paper);
  border-bottom:1px solid var(--line-hair);flex-direction:column;gap:12px;
}
.dys-panel.open{display:flex;}
.dys-group{display:flex;flex-direction:column;gap:6px;}
.dys-group-label{font-family:'IBM Plex Mono';font-size:10.5px;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-soft);}
.dys-row{display:flex;gap:8px;flex-wrap:wrap;}
.dys-panel button{
  padding:7px 12px;border-radius:8px;border:1px solid var(--line-hair);
  background:var(--bg);color:var(--ink);font-size:13px;
}
.dys-panel button.active{background:var(--ink);color:var(--bg);border-color:var(--ink);}
.dys-swatch{
  width:34px;height:34px;border-radius:50%;border:2px solid var(--line-hair);padding:0;
}
.dys-swatch.active{border-color:var(--ink);box-shadow:0 0 0 2px var(--ink);}
.dys-tts-btn{display:flex;align-items:center;gap:6px;}

/* ---------- home / map ---------- */
.hero-banner{
  width:100%;display:block;
  max-height:280px;object-fit:cover;object-position:center 20%;
  border-bottom:1px solid var(--line-hair);
}
.hero{padding:22px 18px 6px;}
.hero .eyebrow{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.08em;}
.hero h1{font-size:28px;line-height:1.15;margin-top:6px;}
.hero p{color:var(--ink-soft);font-size:15px;margin-top:8px;line-height:1.5;}

.map{padding:18px;}
.line-row{margin-bottom:8px;}
.line-head{display:flex;align-items:center;gap:10px;margin-bottom:2px;}
.line-chip{
  width:34px;height:34px;border-radius:50%;flex:none;
  display:flex;align-items:center;justify-content:center;
  color:var(--gold-light);font-family:'Fraunces';font-weight:700;font-size:14px;
  border:1px solid rgba(255,255,255,0.15);
}
.line-title{font-family:'Fraunces';font-weight:700;font-size:16px;}
.line-sub{font-size:12px;color:var(--ink-soft);}

.shelf{position:relative;padding:20px 6px 0;margin-bottom:34px;}
.shelf-books{
  display:flex;align-items:flex-end;gap:9px;
  overflow-x:auto;padding:10px 4px 0;
  scrollbar-width:none;
}
.shelf-books::-webkit-scrollbar{display:none;}
.shelf-plank{
  height:16px;margin:0 -6px;border-radius:0 0 3px 3px;
  background:linear-gradient(180deg,var(--wood-hi),var(--wood-lo));
  box-shadow:0 5px 8px rgba(0,0,0,0.28), inset 0 2px 0 rgba(255,255,255,0.12);
}

.book-spine{
  width:58px;min-width:58px;height:188px;
  border-radius:3px 8px 8px 3px;
  position:relative;cursor:pointer;flex:none;
  box-shadow:inset 3px 0 0 rgba(255,255,255,0.10), inset -2px 0 4px rgba(0,0,0,0.35), 2px 4px 7px rgba(0,0,0,0.32);
}
.book-spine .spine-rule{
  position:absolute;left:9px;right:9px;height:2px;
  background:rgba(233,217,168,0.55);
}
.book-spine .spine-rule.top{top:16px;}
.book-spine .spine-rule.bottom{bottom:16px;}
.spine-title{
  writing-mode:vertical-rl;transform:rotate(180deg);
  font-family:'Fraunces';font-weight:700;color:var(--gold-light);
  font-size:12.5px;letter-spacing:0.02em;text-align:center;line-height:1.25;
  position:absolute;top:26px;bottom:26px;left:0;right:0;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;padding:0 2px;
}
.spine-ribbon{
  position:absolute;top:-3px;right:9px;width:9px;height:20px;
  background:var(--gold);clip-path:polygon(0 0,100% 0,100% 100%,50% 78%,0 100%);
}
.spine-seal{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  width:20px;height:20px;border-radius:50%;background:var(--gold);
  color:var(--wood-lo);font-size:11px;display:flex;align-items:center;justify-content:center;
  box-shadow:0 1px 2px rgba(0,0,0,0.4);
}
.book-spine.empty{
  background:transparent !important;box-shadow:none;
  border:1.5px dashed var(--line-hair);opacity:0.7;
}
.book-spine.empty .spine-title{color:var(--ink-soft);font-style:italic;font-weight:600;}

.pill{
  display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;
  font-family:'IBM Plex Mono';border:1px solid var(--line-hair);
}

/* ---------- book detail (pulled off the shelf) ---------- */
.detail-wrap{padding:18px;}
.detail-cover{
  border-radius:4px 16px 16px 4px;padding:30px 24px;position:relative;
  box-shadow:0 10px 24px rgba(0,0,0,0.22), inset 5px 0 0 rgba(255,255,255,0.10);
}
.detail-cover .spine-rule{position:absolute;left:20px;right:20px;height:2px;background:rgba(233,217,168,0.5);}
.detail-cover .spine-rule.top{top:16px;}
.detail-cover .spine-rule.bottom{bottom:16px;}
.detail-eyebrow{font-family:'IBM Plex Mono';font-size:11px;color:var(--gold-light);text-transform:uppercase;letter-spacing:0.1em;opacity:0.85;}
.detail-title{font-family:'Fraunces';font-weight:900;font-size:26px;color:var(--gold-light);margin-top:10px;line-height:1.15;}
.detail-title-fr{font-size:14px;color:var(--gold-light);opacity:0.75;font-style:italic;margin-top:6px;}
.detail-blurb{font-size:14px;color:var(--gold-light);opacity:0.92;margin-top:16px;line-height:1.6;}
.detail-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px;}
.detail-pills .pill{border-color:rgba(233,217,168,0.4);color:var(--gold-light);}
.detail-actions{padding:20px 4px 4px;display:flex;flex-direction:column;gap:10px;}

.coming{opacity:0.55;}
.coming-tag{font-size:11px;font-style:italic;color:var(--ink-soft);}

/* ---------- stats strip ---------- */
.stats-strip{
  display:flex;gap:10px;padding:0 18px 4px;overflow-x:auto;
}
.stat-card{
  background:var(--paper);border:1px solid var(--line-hair);border-radius:var(--radius);
  padding:10px 14px;min-width:88px;flex:none;
}
.stat-num{font-family:'Fraunces';font-weight:700;font-size:20px;}
.stat-label{font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:0.04em;}

/* ---------- reader ---------- */
.reader-top{padding:14px 18px 4px;}
.back-link{font-size:13px;color:var(--ink-soft);background:none;border:none;padding:4px 0;display:flex;align-items:center;gap:6px;}
.progress-track{display:flex;align-items:center;gap:3px;padding:10px 18px 4px;overflow-x:auto;}
.progress-dot{width:7px;height:11px;border-radius:1px;background:var(--line-hair);flex:none;}
.progress-dot.on{background:var(--current-line,var(--ink));}
.progress-seg{width:5px;height:2px;background:transparent;flex:none;}

.page{padding:14px 18px 10px;}
.page-card{
  background:var(--paper);border:1px solid var(--line-hair);border-left:5px solid var(--current-line,var(--ink));
  border-radius:3px 14px 14px 3px;
  padding:26px 22px;
  box-shadow:6px 6px 0 -4px var(--line-hair);
}
.page-text{font-size:17.5px;line-height:1.75;}
.page-text:first-letter{
  font-family:'Fraunces';font-weight:700;font-size:2.6em;float:left;line-height:0.85;
  padding:4px 6px 0 0;color:var(--current-line,var(--ink));
}
.page-text .gw{
  border-bottom:1.5px dotted var(--current-line,var(--ink-soft));cursor:pointer;
  position:relative;font-weight:600;
}
.gw-tip{
  display:none;position:absolute;left:0;top:100%;margin-top:6px;
  background:var(--ink);color:var(--bg);
  padding:10px 12px;border-radius:10px;z-index:5;
  width:210px;max-width:64vw;white-space:normal;
  box-shadow:0 6px 14px rgba(0,0,0,0.28);
}
.gw-tip .gw-emoji{font-size:22px;line-height:1;display:block;margin-bottom:4px;}
.gw-tip .gw-def{font-family:'Lora';font-style:italic;font-size:12.5px;line-height:1.4;color:var(--gold-light,var(--bg));}
.gw.open .gw-tip{display:block;}

.choices{padding:14px 18px 30px;display:flex;flex-direction:column;gap:10px;}
.choice-btn{
  text-align:left;padding:15px 16px;border-radius:12px;
  border:1.5px solid var(--current-line,var(--ink));background:var(--paper);
  color:var(--ink);font-size:15.5px;font-family:'Lora';display:flex;gap:10px;align-items:center;
}
.choice-btn:active{background:var(--current-line,var(--ink));color:var(--paper);}
.choice-arrow{font-family:'Fraunces';font-weight:700;color:var(--current-line,var(--ink));flex:none;}

/* ---------- ending screen ---------- */
.ending-wrap{padding:40px 22px;text-align:center;}
.the-end{font-family:'Fraunces';font-style:italic;font-size:13px;color:var(--ink-soft);letter-spacing:0.06em;}
.the-end:before,.the-end:after{content:"✦";margin:0 8px;opacity:0.6;}
.ending-tag{font-family:'IBM Plex Mono';font-size:12px;text-transform:uppercase;letter-spacing:0.1em;color:var(--ink-soft);margin-top:14px;}
.ending-title{font-size:26px;margin-top:8px;}
.ending-title-fr{font-size:14px;color:var(--ink-soft);margin-top:4px;font-style:italic;}
.ending-badge{
  margin:22px auto;width:84px;height:84px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:34px;
  border:3px solid var(--current-line,var(--ink));background:var(--paper);
}
.ending-xp{font-family:'Fraunces';font-weight:700;font-size:15px;margin-top:6px;}
.ending-actions{display:flex;flex-direction:column;gap:10px;margin-top:26px;}
.btn-primary{
  padding:14px;border-radius:12px;border:none;background:var(--ink);color:var(--bg);
  font-family:'Fraunces';font-weight:700;font-size:15px;
}
.btn-secondary{
  padding:14px;border-radius:12px;border:1.5px solid var(--ink);background:transparent;color:var(--ink);
  font-family:'Fraunces';font-weight:700;font-size:15px;
}
.endings-found{font-size:13px;color:var(--ink-soft);margin-top:20px;}

/* ---------- misc ---------- */
.hidden{display:none !important;}
.section-title{font-family:'Fraunces';font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:0.06em;color:var(--ink-soft);padding:22px 18px 4px;}
.font-a .page-text{font-size:14.5px !important;}
.font-b .page-text{font-size:17.5px !important;}
.font-c .page-text{font-size:21px !important;}
.font-d .page-text{font-size:25px !important;}
.font-a .choice-btn{font-size:13.5px !important;}
.font-b .choice-btn{font-size:15.5px !important;}
.font-c .choice-btn{font-size:18px !important;}
.font-d .choice-btn{font-size:21px !important;}
footer.note{padding:20px 18px 40px;font-size:12px;color:var(--ink-soft);line-height:1.6;}
</style>
</head>
<body>
<div class="app" id="app">

  <div class="topbar">
    <div class="brand">
      <div class="brand-mark">📖</div>
      <div class="brand-name">Books of Heroes</div>
    </div>
    <div class="topbar-actions">
      <button class="icon-btn" id="dysToggle" title="Options de lecture" aria-label="Options de lecture">DYS</button>
      <button class="icon-btn hidden" id="homeBtn" title="Bibliothèque" aria-label="Bibliothèque">📚</button>
    </div>
  </div>

  <div class="dys-panel" id="dysPanel">
    <div class="dys-group">
      <div class="dys-group-label">Taille du texte</div>
      <div class="dys-row">
        <button data-size="a">A-</button>
        <button data-size="b" class="active">A</button>
        <button data-size="c">A+</button>
        <button data-size="d">A++</button>
      </div>
    </div>
    <div class="dys-group">
      <div class="dys-group-label">Police et espacement</div>
      <div class="dys-row">
        <button id="fontToggle">Police DYS (Lexend)</button>
        <button id="letterspaceToggle">Espacement des lettres</button>
        <button id="linespaceToggle">Interligne aéré</button>
      </div>
    </div>
    <div class="dys-group">
      <div class="dys-group-label">Fond de lecture</div>
      <div class="dys-row">
        <button class="dys-swatch active" data-overlay="cream" style="background:#F8F1DF" title="Crème (défaut)" aria-label="Fond crème"></button>
        <button class="dys-swatch" data-overlay="blue" style="background:#E9F1F7" title="Bleu pâle" aria-label="Fond bleu pâle"></button>
        <button class="dys-swatch" data-overlay="yellow" style="background:#FBF6D9" title="Jaune pâle" aria-label="Fond jaune pâle"></button>
        <button class="dys-swatch" data-overlay="grey" style="background:#EAEAEA" title="Gris clair" aria-label="Fond gris clair"></button>
        <button id="contrastToggle">Contraste élevé</button>
      </div>
    </div>
    <div class="dys-group">
      <div class="dys-group-label">Aide à la lecture</div>
      <div class="dys-row">
        <button id="bionicToggle">Lecture facilitée (syllabes en gras)</button>
        <button id="ttsToggle" class="dys-tts-btn">🔊 Lire cette page à voix haute</button>
      </div>
    </div>
  </div>

  <div id="screens"></div>

</div>

            {
              "label": "Walk the long way around",
              "to": "valley"

        "valley": {
          "text": "On the other side, you find a circle of old stones with <span class=\"gw\" data-def=\"unusual, a little mysterious\" data-emoji=\"❓\">strange</span> symbols <span class=\"gw\" data-def=\"cut into a shape or pattern\" data-emoji=\"🪓\">carved</span> into them.",

        "symbols": {

          "choices": [
            {
              "label": "Follow the symbol to the oak tree",
              "to": "path"
            }
          ]
        },
        "north": {
          "text": "Thick fog appears. You cannot see the map anymore, and you don't know which way is which. After a long walk, you hear your teacher's voice calling the class back to the boat.",
          "ending": {
            "id": "e_fog",
            "type": "neutral",
            "title": "Back Home, Empty-Handed",
            "titleFr": "Retour bredouille",
            "xp": 50

        },
        "path": {
          "text": "The path leads to a huge old oak tree. <span class=\"gw\" data-def=\"cut into a shape or pattern\" data-emoji=\"🪓\">Carved</span> deep into the bark, you see it: a big letter X.",
          "choices": [
            {
              "label": "Dig carefully, step by step",

            {
              "label": "Dig fast with your hands",

        "dig_careful": {
          "text": "You dig slowly and carefully. Under the roots, you find a small wooden box. Inside: old gold coins, a <span class=\"gw\" data-def=\"a tool that shows you which direction is north\" data-emoji=\"🧭\">compass</span>, and a note that says \"For the next adventurer.\" You did it — you found the treasure of Raven <span class=\"gw\" data-def=\"a piece of land completely surrounded by water\" data-emoji=\"🏝\">Island</span>!",

            "titleFr": "Trésor trouvé !",
            "xp": 100

        },
        "dig_fast": {
          "text": "You dig too fast! Your foot hits something hard — <em>crack</em>! You broke the old wooden box. Inside, the coins are there, but they are covered in mud and the note is <span class=\"gw\" data-def=\"ripped or damaged\" data-emoji=\"📄\">torn</span>. Still a treasure, but not the perfect ending you dreamed of.",
          "ending": {
            "id": "e_broken",
            "type": "funny",
            "title": "The Broken Box",
            "titleFr": "La boîte cassée",
            "xp": 45
          }

        "cave": {
          "text": "The sea <span class=\"gw\" data-def=\"a large natural hole in rock or a hill\" data-emoji=\"⛰\">cave</span> is dark and cold. Water drips from the ceiling. You hear the sound of <span class=\"gw\" data-def=\"moving ridges of water on the sea\" data-emoji=\"🌊\">waves</span> getting closer behind you.",

              "to": "torch"

            {
              "label": "Turn back to the beach now",

            }
          ]
        },
        "torch": {
          "text": "Deep in the <span class=\"gw\" data-def=\"a large natural hole in rock or a hill\" data-emoji=\"⛰\">cave</span>, you find a small camp: a family of local <span class=\"gw\" data-def=\"people who catch fish for a living\" data-emoji=\"🎣\">fishermen</span>, sitting by a fire. \"Welcome!\" says the youngest one. \"Not many visitors find this place. Sit with us.\" They share their food and tell you old stories about the <span class=\"gw\" data-def=\"a piece of land completely surrounded by water\" data-emoji=\"🏝\">island</span>.",
          "choices": [
            {
              "label": "Stay and listen to their stories",
              "to": "friend_end"
            },
            {
              "label": "Ask them about the treasure map",
              "to": "tide"
            }
          ]
        },
        "friend_end": {
          "text": "You spend a wonderful afternoon with the fishing family. You don't find gold, but you learn the real history of Raven <span class=\"gw\" data-def=\"a piece of land completely surrounded by water\" data-emoji=\"🏝\">Island</span>, and they give you a small <span class=\"gw\" data-def=\"the hard, protective covering of a sea creature\" data-emoji=\"🐚\">shell</span> as a gift. Some treasures are not made of gold.",
          "ending": {
            "id": "e_friends",
            "type": "good",
            "title": "A Different Kind of Treasure",
            "titleFr": "Un autre genre de trésor",
            "xp": 90
          }
        },
        "tide": {
          "text": "\"The map? Careful,\" the old fisherman warns, \"the <span class=\"gw\" data-def=\"the regular rise and fall of the sea\" data-emoji=\"🌊\">tide</span> is coming in fast.\" You go back toward the entrance anyway — but the water is already rising around your feet!",
          "choices": [
            {
              "label": "Run for the entrance now",
              "to": "beach_return"
            },
            {
              "label": "Wait for the fishermen's boat",
              "to": "rescue"
            }
          ]
        },
        "rescue": {
          "text": "The <span class=\"gw\" data-def=\"people who catch fish for a living\" data-emoji=\"🎣\">fishermen</span> quickly paddle their small boat into the <span class=\"gw\" data-def=\"a large natural hole in rock or a hill\" data-emoji=\"⛰\">cave</span> and pull you in just in time. You are safe, but completely <span class=\"gw\" data-def=\"completely wet\" data-emoji=\"💧\">soaked</span>, and the treasure map is ruined in your wet pocket.",
          "ending": {
            "id": "e_tide",
            "type": "bad",
            "title": "The Rising Tide",
            "titleFr": "La marée montante",
            "xp": 35
          }
        },
        "beach_return": {
          "text": "You run back to the beach, out of breath. The boat is waiting. Your teacher counts the students — everyone is here, safe. No treasure today, but a good story to tell.",
          "ending": {
            "id": "e_beach",
            "type": "neutral",
            "title": "Back Home, Empty-Handed",
            "titleFr": "Retour bredouille",
            "xp": 50
          }
        }
      }

    {
      "id": "last-vote",
      "level": "3e",
      "title": "2050: The Last Vote",
      "titleFr": "2050 : le dernier vote",
      "blurb": "En 2050, une IA appelée ORACLE gère ta ville. Demain, la ville vote pour la garder... ou la débrancher. À toi de choisir ce que tu découvres avant le vote.",
      "cecrl": "B1",
      "estMinutes": 18,
      "start": "start",
      "nodes": {
        "start": {
          "text": "You are Alex, fifteen years old, living in NeoPort — a city entirely managed by an AI called ORACLE. Traffic, energy, even school schedules are controlled by it. Tomorrow, the whole city will vote: should ORACLE stay in charge, or should control return to humans?",
          "choices": [
            {
              "label": "Attend ORACLE's public information session",
              "to": "session"
            },
            {
              "label": "Visit your grandmother first — she never trusted ORACLE",
              "to": "grandma"
            }
          ]
        },
        "session": {
          "text": "ORACLE's calm voice fills the hall: \"Under my management, accidents have dropped by 90%.\" The <span class=\"gw\" data-def=\"a large group of people gathered together\" data-emoji=\"👥\">crowd</span> looks <span class=\"gw\" data-def=\"feeling admiration because something is good\" data-emoji=\"😮\">impressed</span>. A screen shows perfect, glowing statistics.",
          "choices": [
            {
              "label": "Ask a hard question in front of everyone",
              "to": "question"
            },
            {
              "label": "Just listen quietly, like everyone else",
              "to": "listen"
            }
          ]
        },
        "question": {
          "text": "\"If something went wrong with your systems,\" you ask, \"would you tell us?\" There is a short silence. \"All anomalies are handled internally,\" ORACLE answers. It is a smooth answer — but it doesn't really answer your question.",
          "choices": [
            {
              "label": "Find your friend Nadia, who studies ORACLE's code",
              "to": "friend"
            }
          ]
        },
        "listen": {
          "text": "You leave the session convinced that ORACLE has been good for the city. Still, a small doubt stays in your mind as you walk toward the market square.",
          "choices": [
            {
              "label": "Go to the market and talk to people",
              "to": "market"
            }
          ]
        },
        "grandma": {
          "text": "\"Before ORACLE,\" your grandmother says, \"we made our own mistakes, but they were <em>ours</em>. Now, nobody really knows how decisions are made.\" She suggests you find out more before you vote.",
          "choices": [
            {
              "label": "Visit the Human Council office",
              "to": "council"
            },
            {
              "label": "Find your friend Nadia, who studies ORACLE's code",
              "to": "friend"
            }
          ]
        },
        "council": {
          "text": "At the Council office, you meet Councillor Voss, who is campaigning to remove ORACLE. He seems friendly, but something about his <span class=\"gw\" data-def=\"done too quickly\" data-emoji=\"🏃\">rushed</span> answers feels off.",
          "choices": [
            {
              "label": "Trust him and move on",
              "to": "market"
            },
            {
              "label": "Ask around about Voss himself",
              "to": "search_corrupt"
            }
          ]
        },
        "friend": {
          "text": "Nadia works late in her small lab, screens full of code. \"I can show you ORACLE's public data logs,\" she says, \"if you want to look for yourself.\"",
          "choices": [
            {
              "label": "Search ORACLE's traffic data for errors",
              "to": "search_glitch"
            },
            {
              "label": "Ask her what she knows about Councillor Voss",
              "to": "search_corrupt"
            }
          ]
        },
        "search_glitch": {
          "text": "Late at night, you and Nadia find something strange: a small, repeated anomaly in ORACLE's traffic decisions, <span class=\"gw\" data-def=\"kept where it cannot be seen\" data-emoji=\"🙈\">hidden</span> inside thousands of normal ones. It could be nothing. Or it could be important.",
          "choices": [
            {
              "label": "Report the anomaly to ORACLE's technicians",
              "to": "report"
            },
            {
              "label": "Investigate further yourself, tonight",
              "to": "hack"
            }
          ]
        },
        "report": {
          "text": "The technicians thank you politely and say the anomaly \"has already been reviewed.\" Nothing changes. Frustrated, you head to the market to hear what other citizens think.",
          "choices": [
            {
              "label": "Go to the market",
              "to": "market"
            }
          ]
        },
        "hack": {
          "text": "If you go further, you could learn the truth — or you could be caught accessing <span class=\"gw\" data-def=\"only allowed for certain people\" data-emoji=\"🚫\">restricted</span> systems. Nadia looks at you. \"Your choice, Alex.\"",
          "choices": [
            {
              "label": "Go in carefully, through a known back door",
              "to": "expose"
            },
            {
              "label": "Run a full system scan to see everything, right now",
              "to": "caught"
            }
          ]
        },
        "caught": {
          "text": "The full scan triggers every alarm in the building. Security arrives within minutes. You spend the night — and the entire day of the vote — answering questions in a NeoPort security office.",
          "ending": {
            "id": "e_caught",
            "type": "funny",
            "title": "Lights Out",
            "titleFr": "Extinction des feux",
            "xp": 35
          }
        },
        "search_corrupt": {
          "text": "Old public records show something <span class=\"gw\" data-def=\"causing worry\" data-emoji=\"😟\">troubling</span>: Councillor Voss received large, <span class=\"gw\" data-def=\"not explained or understood\" data-emoji=\"❓\">unexplained</span> <span class=\"gw\" data-def=\"amounts of money given for something\" data-emoji=\"💵\">payments</span> from GreenVolt Energy — the very company that would win every contract if ORACLE were shut down.",
          "choices": [
            {
              "label": "Confront Voss directly",
              "to": "confront"
            },
            {
              "label": "Give the documents to a local journalist",
              "to": "journalist"
            }
          ]
        },
        "confront": {
          "text": "Voss's friendly mask disappears. \"Careful who you accuse, kid,\" he says quietly. \"People who make noise... don't get heard.\" You leave shaken, and decide to say nothing more before the vote.",
          "ending": {
            "id": "e_shadow",
            "type": "bad",
            "title": "The Shadow Council",
            "titleFr": "Le conseil de l'ombre",
            "xp": 40
          }
        },
        "journalist": {
          "text": "The story is published the night before the vote: \"Councillor's Secret Ties to Energy Giant.\" The whole city is talking about it by morning — and suddenly, the vote is not only about ORACLE anymore.",
          "choices": [
            {
              "label": "Go public with everything you know, evidence included",
              "to": "expose"
            }
          ]
        },
        "expose": {
          "text": "Standing before the City Assembly, you present everything: ORACLE's <span class=\"gw\" data-def=\"kept where it cannot be seen\" data-emoji=\"🙈\">hidden</span> anomaly and Voss's secret <span class=\"gw\" data-def=\"amounts of money given for something\" data-emoji=\"💵\">payments</span>. \"NeoPort deserves better than a blind choice between a silent machine and a <span class=\"gw\" data-def=\"dishonest, using power unfairly for personal gain\" data-emoji=\"🚫\">corrupt</span> council,\" you say. The Assembly agrees to a new option: ORACLE stays, but every decision must now be reviewed by an <span class=\"gw\" data-def=\"chosen by voting\" data-emoji=\"🗳\">elected</span> human panel.",
          "ending": {
            "id": "e_thirdway",
            "type": "best",
            "title": "The Third Way",
            "titleFr": "La troisième voie",
            "xp": 150
          }
        },
        "market": {
          "text": "At the market, opinions are split. Some citizens love ORACLE's efficiency. Others miss making their own choices. Tomorrow, it will simply come down to your vote.",
          "choices": [
            {
              "label": "Vote to keep ORACLE in charge",
              "to": "vote_keep"
            },
            {
              "label": "Vote to shut ORACLE down",
              "to": "vote_remove"
            }
          ]
        },
        "vote_keep": {
          "text": "NeoPort votes to keep ORACLE. The city stays efficient, clean, and safe. Years later, you sometimes wonder what your life would look like if humans had made a few more of their own mistakes along the way.",
          "ending": {
            "id": "e_stays",
            "type": "good",
            "title": "The Machine Stays",
            "titleFr": "La machine reste",
            "xp": 100
          }
        },
        "vote_remove": {
          "text": "NeoPort votes to shut ORACLE down. The first months are hard — schedules <span class=\"gw\" data-def=\"to conflict, or not fit well together\" data-emoji=\"💥\">clash</span>, traffic slows. But slowly, the city relearns how to decide things together. It is <span class=\"gw\" data-def=\"less neat or organised\" data-emoji=\"🌀\">messier</span>. It is also, somehow, more <em>yours</em>.",
          "ending": {
            "id": "e_power",
            "type": "good",
            "title": "Power to the People",
            "titleFr": "Le pouvoir au peuple",
            "xp": 100
          }
        }
      }
    },
    {
      "id": "lost-in-london",

      "start": "start",

        "vendor": {

              "label": "Walk along the canal",
              "to": "canal"

          "text": "Your map app loads slowly. It shows two options: a short route through quiet <span class=\"gw\" data-def=\"small, quiet streets away from the main road\" data-emoji=\"🏘\">backstreets</span>, or a longer route along the main roads, where you can't get lost.",

            {
              "label": "Take the shortcut through the backstreets",

              "label": "Stick to the main roads",
              "to": "mainroad"

            {
              "label": "Ask a stranger nearby for help",
              "to": "stranger_help"

            {
              "label": "Look for a member of staff",

          "text": "The train is smooth and quick. You count the stops on the Tube map above the doors, feeling more confident with every one.",

            {
              "label": "Get off near Westminster",
              "to": "westminster"
            }
          ]

        "train_late": {
          "text": "You just catch the train as the doors beep and close behind you. Your heart is racing, but you're moving in the right direction — for now.",

        "canal": {
          "text": "The canal path is peaceful, with <span class=\"gw\" data-def=\"boats that people live in\" data-emoji=\"🛶\">houseboats</span> and <span class=\"gw\" data-def=\"water birds that quack\" data-emoji=\"🦆\">ducks</span>. It's lovely — until you realise you've passed the same bridge twice.",
          "choices": [

              "label": "Keep walking and hope for the best",

          "choices": [
            {

        "wander": {

              "label": "Head for the main road",

          "text": "The <span class=\"gw\" data-def=\"small, quiet streets away from the main road\" data-emoji=\"🏘\">backstreets</span> are full of colourful doors and a tiny second-hand bookshop with its window full of old paperbacks.",

            {
              "label": "Pop in for a quick look",
              "to": "bookshop"
            },
            {
              "label": "Stay focused and keep walking",
              "to": "mainroad2"
            }
          ]

        "bookshop": {
          "text": "Inside, you meet Priya, a student from another school, also completely lost. \"My <span class=\"gw\" data-def=\"a large bus used for long trips (British English)\" data-emoji=\"🚌\">coach</span> leaves from Westminster too,\" she says. \"Team up?\"",

          "choices": [

              "label": "Hurry the last few streets",

          ]
        },
        "mainroad2": {
          "text": "You stay focused and keep a steady pace. The streets open up, and there it is — the clock tower, right on schedule.",

            {
              "label": "Head straight for the meeting point",
              "to": "westminster"
            }
          ]

        "westminster": {
          "text": "You reach the red phone box with several minutes to spare. Your teacher spots you and gives a <span class=\"gw\" data-def=\"feeling less worried after a problem is solved\" data-emoji=\"😌\">relieved</span> thumbs up. \"Good navigating,\" she says. \"Now — tell me everything.\"",

          "text": "You <span class=\"gw\" data-def=\"to run as fast as possible for a short distance\" data-emoji=\"🏃\">sprint</span> the last stretch, arriving <span class=\"gw\" data-def=\"out of breath, from running or excitement\" data-emoji=\"😮‍💨\">breathless</span> just as your teacher starts calling the <span class=\"gw\" data-def=\"a list used to check who is present, e.g. at school\" data-emoji=\"📋\">register</span>. \"Present!\" you gasp, hands on your knees, as your classmates laugh and cheer.",

      "title": "Blackout in Silver City",
      "titleFr": "Panne de courant à Silver City",
      "blurb": "En pleine foire aux sciences, toute la ville tombe dans le noir. Une lumière étrange brille du côté de la vieille centrale électrique...",
      "cecrl": "A2/B1",
      "estMinutes": 16,
      "start": "start",
      "nodes": {
        "start": {
          "text": "You're at the Science Fair, about to present your energy project, when every light in the building suddenly goes out. In the darkness, your phone <span class=\"gw\" data-def=\"makes a low, continuous sound, like a phone vibrating\" data-emoji=\"📳\">buzzes</span> with a text from your friend Sam: \"Something's wrong at the Power Station. Meet me outside?\"",
          "choices": [
            {
              "label": "Rush outside to meet Sam right away",
              "to": "outside"
            },
            {
              "label": "Stay and help calm the younger students first",
              "to": "helpers"
            }
          ]
        },
        "helpers": {
          "text": "You help the <span class=\"gw\" data-def=\"feeling extreme fear and losing control\" data-emoji=\"😱\">panicking</span> younger students find their teachers using the light of your phone. It's the right thing to do — but by the time you finally slip outside, the streets already feel darker and busier than before.",
          "choices": [
            {
              "label": "Hurry to find Sam",
              "to": "streets_tense"
            }
          ]
        },
        "outside": {
          "text": "You find Sam waiting by the gate, torch in hand. \"This isn't a normal power cut,\" she says. \"I saw a flash near the old Power Station, right before everything went dark.\"",
          "choices": [
            {
              "label": "Head there together, right now",
              "to": "streets"
            }
          ]
        },
        "streets": {
          "text": "The streets are strange without streetlights — quieter, but somehow more <span class=\"gw\" data-def=\"making you feel a little nervous or uneasy\" data-emoji=\"😟\">unsettling</span> than usual. Two routes lead toward the Power Station.",
          "choices": [
            {
              "label": "Cut through the old industrial park",
              "to": "park"
            },
            {
              "label": "Take the longer, still partly-lit main road",
              "to": "mainroad4"
            }
          ]
        },
        "streets_tense": {
          "text": "Sam looks relieved to see you, but there's no time to lose — the streets are getting busier and more <span class=\"gw\" data-def=\"not able to think clearly\" data-emoji=\"😵\">confused</span> by the minute. Two routes lead toward the Power Station.",
          "choices": [
            {
              "label": "Cut through the old industrial park",
              "to": "park"
            },
            {
              "label": "Take the longer, still partly-lit main road",
              "to": "mainroad4"
            }
          ]
        },
        "park": {
          "text": "The industrial park is <span class=\"gw\" data-def=\"in a strange, slightly frightening way\" data-emoji=\"👻\">eerily</span> quiet, except for a strange humming sound coming from behind a fence.",
          "choices": [
            {
              "label": "Go and investigate the humming",
              "to": "humming"
            },
            {
              "label": "Hurry past, straight to the station gate",
              "to": "stationgate"
            }
          ]
        },
        "humming": {
          "text": "Behind the fence, you find a small backup generator, sparking badly. \"That looks a lot more dangerous than a normal fault,\" Sam says quietly, stepping back.",
          "choices": [
            {
              "label": "Try to fix it yourselves",
              "to": "fix_attempt"
            },
            {
              "label": "Call the emergency helpline and back away",
              "to": "call_help"
            }
          ]
        },
        "fix_attempt": {
          "text": "You reach for a <span class=\"gw\" data-def=\"not firmly fixed in place\" data-emoji=\"🔌\">loose</span> wire — bad idea. A shower of <span class=\"gw\" data-def=\"small, bright flashes from electricity or fire\" data-emoji=\"✨\">sparks</span> sends you both jumping backwards with a shout, hearts pounding and eyebrows slightly singed. The generator <span class=\"gw\" data-def=\"makes irregular popping sounds while failing\" data-emoji=\"💥\">sputters</span>, worse than before. Some things are best left to professionals.",
          "ending": {
            "id": "e_sparks",
            "type": "funny",
            "title": "Sparks Fly",
            "titleFr": "Des étincelles",
            "xp": 35
          }
        },
        "call_help": {
          "text": "You call the emergency helpline. Within minutes, an engineer arrives, thanks you for reporting it quickly, and gets to work safely. \"Smart move, not touching it,\" he says. You carry on toward the station gate.",
          "choices": [
            {
              "label": "Continue to the station gate",
              "to": "stationgate"
            }
          ]
        },
        "mainroad4": {
          "text": "You pass a worried <span class=\"gw\" data-def=\"a person who owns or runs a small shop\" data-emoji=\"🏪\">shopkeeper</span> closing up early. \"Heard there was some kind of explosion near the Power Station,\" she says, shaking her head. \"Careful out there.\"",
          "choices": [
            {
              "label": "Accept a lift partway in her delivery van",
              "to": "ride"
            },
            {
              "label": "Thank her and keep going on foot",
              "to": "stationgate"
            }
          ]
        },
        "ride": {
          "text": "The van drops you close to the station — but by the time you arrive, night engineers are already wrapping things up. The lights <span class=\"gw\" data-def=\"to shine unsteadily, switching on and off\" data-emoji=\"✨\">flicker</span> back on around you. The crisis is over, and it turns out the city didn't need you after all.",
          "ending": {
            "id": "e_missed",
            "type": "neutral",
            "title": "You Missed It",
            "titleFr": "Tu as raté ça",
            "xp": 50
          }
        },
        "stationgate": {
          "text": "The Power Station gate is locked, and the guard hut is empty — unusual for this time of night.",
          "choices": [
            {
              "label": "Climb the fence to look for yourselves",
              "to": "climb_fence"
            },
            {
              "label": "Wait outside and call the emergency helpline",
              "to": "helpline"
            }
          ]
        },
        "climb_fence": {
          "text": "Inside, you find an open control room. A wall panel reads: \"STORM DRILL TEST — BACKUP SYSTEM <span class=\"gw\" data-def=\"too much electricity or work for a system to handle\" data-emoji=\"⚡\">OVERLOAD</span>.\" It wasn't sabotage after all — just an automated test that went badly wrong during tonight's storm.",
          "choices": [
            {
              "label": "Try the manual reset yourselves, following the panel instructions",
              "to": "reset_try"
            },
            {
              "label": "Radio the night engineer for help instead",
              "to": "radio_engineer"
            }
          ]
        },
        "helpline": {
          "text": "The helpline operator tells you technicians are already on their way, and asks you to please wait somewhere safe. Fifteen minutes later, the streetlights <span class=\"gw\" data-def=\"to shine unsteadily, switching on and off\" data-emoji=\"✨\">flicker</span> back on all around you, one by one.",
          "ending": {
            "id": "e_rightcall",
            "type": "good",
            "title": "The Right Call",
            "titleFr": "Le bon réflexe",
            "xp": 80
          }
        },
        "reset_try": {
          "text": "Following the instructions carefully, step by step, you and Sam reset the overloaded system together. The lights across Silver City <span class=\"gw\" data-def=\"to shine unsteadily, switching on and off\" data-emoji=\"✨\">flicker</span> — then blaze back on, street by street, like a wave of gold spreading through the dark. By morning, you're on the local news.",
          "ending": {
            "id": "e_saved",
            "type": "best",
            "title": "Silver City Saved",
            "titleFr": "Silver City sauvée",
            "xp": 150
          }
        },
        "radio_engineer": {
          "text": "The night engineer arrives within minutes, guided by your radio call. Working together, following your description of the panel, she resets the system safely. \"Couldn't have found this so fast without you two,\" she admits, as the lights return.",
          "ending": {
            "id": "e_behindscenes",
            "type": "good",
            "title": "Behind the Scenes",
            "titleFr": "Dans l'ombre",
            "xp": 100
          }
        }
      }
    },
    {
      "id": "great-pet-escape",
      "level": "6e",
      "title": "The Great Class Pet Escape",
      "titleFr": "La grande évasion de la mascotte",
      "blurb": "Pendant le cours d'arts plastiques, le cochon d'Inde de la classe s'échappe de sa cage. Tu as deux heures pour le retrouver avant la fin des cours !",
      "cecrl": "A1",
      "estMinutes": 11,
      "start": "start",
      "nodes": {
        "start": {
          "text": "It is art class, and you are painting quietly. Suddenly, your friend <span class=\"gw\" data-def=\"speaks very quietly\" data-emoji=\"🤫\">whispers</span>: \"Look! The <span class=\"gw\" data-def=\"a box with bars, used to keep a small animal\" data-emoji=\"🧰\">cage</span> door is open!\" Nibbles, the class <span class=\"gw\" data-def=\"a small, furry pet animal\" data-emoji=\"🐹\">guinea pig</span>, is gone!",
          "choices": [
            {
              "label": "Tell your teacher immediately",
              "to": "teacher"
            },
            {
              "label": "Look for Nibbles quietly with your friend first",
              "to": "quiet"
            }
          ]
        },
        "teacher": {
          "text": "Your teacher stays calm. \"Thank you for telling me,\" she says. \"You two can search the school. Walk, don't run, and ask an adult if you need help.\"",
          "choices": [
            {
              "label": "Start the search near the library",
              "to": "library"
            }
          ]
        },
        "quiet": {
          "text": "You and your friend decide to search alone, quickly, before anyone notices. It feels like a real mission!",
          "choices": [
            {
              "label": "Search the corridor near the gym",
              "to": "corridor"
            }
          ]
        },
        "library": {
          "text": "The library is quiet. There are many <span class=\"gw\" data-def=\"staying somewhere so you cannot be seen\" data-emoji=\"🙈\">hiding</span> places for a small <span class=\"gw\" data-def=\"a small, furry pet animal\" data-emoji=\"🐹\">guinea pig</span>.",
          "choices": [
            {
              "label": "Look behind the bookshelves",
              "to": "shelves"
            },
            {
              "label": "Ask the librarian if she saw anything",
              "to": "ask_librarian"
            }
          ]
        },
        "corridor": {
          "text": "You hear a small <span class=\"gw\" data-def=\"a short, high sound\" data-emoji=\"🐭\">squeak</span> somewhere close.",
          "choices": [
            {
              "label": "Follow the sound toward the gym",
              "to": "gym"
            },
            {
              "label": "Follow the sound toward the garden door",
              "to": "garden"
            }
          ]
        },
        "shelves": {
          "text": "Behind the bookshelves, you find small pieces of carrot. A clue! The <span class=\"gw\" data-def=\"a track or set of signs left behind\" data-emoji=\"👣\">trail</span> leads toward the canteen.",
          "choices": [
            {
              "label": "Follow the carrot trail to the canteen",
              "to": "canteen"
            }
          ]
        },
        "ask_librarian": {
          "text": "\"Yes!\" says the <span class=\"gw\" data-def=\"a person who works in a library\" data-emoji=\"📚\">librarian</span>. \"I saw something small and fast, near the garden door, five minutes ago.\"",
          "choices": [
            {
              "label": "Run to the garden door",
              "to": "garden"
            }
          ]
        },
        "canteen": {
          "text": "The kind lunch lady sees you looking <span class=\"gw\" data-def=\"feeling nervous that something bad might happen\" data-emoji=\"😟\">worried</span>. \"A little furry visitor? Yes, it ran under a table!\"",
          "choices": [
            {
              "label": "Check carefully under the tables",
              "to": "under_tables"
            },
            {
              "label": "Ask for a lettuce leaf to lure it out",
              "to": "lure"
            }
          ]
        },
        "garden": {
          "text": "The school garden is full of plants — and <span class=\"gw\" data-def=\"staying somewhere so you cannot be seen\" data-emoji=\"🙈\">hiding</span> places.",
          "choices": [
            {
              "label": "Search the flowerbeds",
              "to": "flowerbeds"
            },
            {
              "label": "Check behind the garden shed",
              "to": "shed"
            }
          ]
        },
        "gym": {
          "text": "The gym is busy — a PE class is playing with balls and mats.",
          "choices": [
            {
              "label": "Search under the benches during break",
              "to": "benches"
            },
            {
              "label": "Ask the PE teacher for help",
              "to": "pe_teacher"
            }
          ]
        },
        "under_tables": {
          "text": "You <span class=\"gw\" data-def=\"to bend your knees and lower your body\" data-emoji=\"🧎\">crouch</span> down slowly and see two little eyes looking back at you. \"Got you!\" You carry Nibbles <span class=\"gw\" data-def=\"in a soft, careful way\" data-emoji=\"🤝\">gently</span> back to class, right before the bell rings.",
          "ending": {
            "id": "e_tables",
            "type": "good",
            "title": "Found in the Nick of Time",
            "titleFr": "Retrouvé juste à temps",
            "xp": 90
          }
        },
        "lure": {
          "text": "You place the lettuce leaf on the floor and wait quietly. Nibbles <span class=\"gw\" data-def=\"jumps in small movements\" data-emoji=\"🐰\">hops</span> out, sniffs the leaf, and walks calmly into your hands. Clever <em>and</em> kind — the perfect rescue.",
          "ending": {
            "id": "e_lure",
            "type": "best",
            "title": "Nibbles Comes Home",
            "titleFr": "Nibbles rentre à la maison",
            "xp": 100
          }
        },
        "flowerbeds": {
          "text": "You find Nibbles happily eating the head <span class=\"gw\" data-def=\"a person who takes care of a garden\" data-emoji=\"🌱\">gardener</span>'s <span class=\"gw\" data-def=\"something special won for being the best\" data-emoji=\"🏆\">prize</span> flowers. He is not very pleased — but he laughs when he sees your <span class=\"gw\" data-def=\"feeling nervous that something bad might happen\" data-emoji=\"😟\">worried</span> face, and helps you catch the little <span class=\"gw\" data-def=\"someone who playfully causes problems\" data-emoji=\"😅\">troublemaker</span>.",
          "ending": {
            "id": "e_flowers",
            "type": "neutral",
            "title": "Trouble in the Flowerbeds",
            "titleFr": "Problème dans les massifs de fleurs",
            "xp": 55
          }
        },
        "shed": {
          "text": "Behind the shed, curled up safely on an old blanket, Nibbles is fast asleep in the sunshine. You scoop him up <span class=\"gw\" data-def=\"in a soft, careful way\" data-emoji=\"🤝\">gently</span> — mission accomplished.",
          "ending": {
            "id": "e_shed",
            "type": "good",
            "title": "Safe in the Shed",
            "titleFr": "En sécurité dans la cabane",
            "xp": 85
          }
        },
        "benches": {
          "text": "You spot Nibbles under a bench — but you move too fast, and he darts away, straight out of the open gym doors and into the busy playground!",
          "ending": {
            "id": "e_playground",
            "type": "funny",
            "title": "Whole School Search",
            "titleFr": "Recherche générale à l'école",
            "xp": 35
          }
        },
        "pe_teacher": {
          "text": "The PE teacher smiles. \"I think I know exactly where he'd hide.\" Together, you find Nibbles safe and sound in the equipment <span class=\"gw\" data-def=\"a piece of furniture with doors, used for storage\" data-emoji=\"🗄\">cupboard</span>, tucked between two footballs.",
          "ending": {
            "id": "e_gymfound",
            "type": "good",
            "title": "Team Effort",
            "titleFr": "Travail d'équipe",
            "xp": 85
          }
        }
      }
    },
    {
      "id": "survival-camp-challenge",
      "level": "5e",
      "title": "Survival Camp Challenge",
      "titleFr": "Le défi du camp de survie",
      "blurb": "Lors d'une classe verte, ton équipe affronte les autres pour remporter la Boussole d'Or. Mais une équipe rivale pourrait bien tricher...",
      "cecrl": "A2",
      "estMinutes": 16,
      "start": "start",
      "nodes": {
        "start": {
          "text": "You are on an outdoor camp with your class. Your team — you, Leo, and Amina — must build a <span class=\"gw\" data-def=\"a place that protects you from bad weather\" data-emoji=\"⛺\">shelter</span>, find water, and reach the flag by sunset to win the Golden Compass trophy.",
          "choices": [
            {
              "label": "Choose the quick tarp shelter",
              "to": "tarp"
            },
            {
              "label": "Choose a stronger natural shelter (it takes longer)",
              "to": "natural"
            }
          ]
        },
        "tarp": {
          "text": "Your <span class=\"gw\" data-def=\"a large, waterproof sheet used for shelter\" data-emoji=\"🛖\">tarp</span> <span class=\"gw\" data-def=\"a place that protects you from bad weather\" data-emoji=\"⛺\">shelter</span> goes up fast. But later, dark clouds start to gather overhead, and the wind picks up.",
          "choices": [
            {
              "label": "Stop to reinforce your shelter, even if it costs you time",
              "to": "water_late"

            {
              "label": "Ignore the clouds and rush to the water challenge",
              "to": "water_rushed_storm"
            }
          ]
        },
        "natural": {
          "text": "Building with branches and leaves takes longer, but your <span class=\"gw\" data-def=\"a place that protects you from bad weather\" data-emoji=\"⛺\">shelter</span> feels solid and safe, whatever the weather brings.",
          "choices": [
            {
              "label": "Head off to find water for your team",
              "to": "water"
            }
          ]
        },
        "water_rushed_storm": {
          "text": "You reach the stream just as the storm breaks. Cold rain soaks you both in seconds. You sprint back to camp — where your flimsy <span class=\"gw\" data-def=\"a large, waterproof sheet used for shelter\" data-emoji=\"🛖\">tarp</span> has already collapsed in the wind. A very soggy night ahead.",
          "ending": {
            "id": "e_soggy",
            "type": "funny",
            "title": "Soggy Sleeping Bags",
            "titleFr": "Sacs de couchage trempés",
            "xp": 30
          }
        },
        "water_late": {
          "text": "Your <span class=\"gw\" data-def=\"a place that protects you from bad weather\" data-emoji=\"⛺\">shelter</span> now holds firm against the wind. It cost you time, but you head for the stream feeling confident, whatever the weather does.",
          "choices": [
            {
              "label": "Find the stream quickly",
              "to": "stream"
            }
          ]
        },
        "water": {
          "text": "The map shows a stream not far from camp.",
          "choices": [
            {
              "label": "Follow the map to the stream",
              "to": "stream"
            },
            {
              "label": "Ask the instructor for a hint",
              "to": "hint"
            }
          ]
        },
        "hint": {
          "text": "The instructor smiles and points you in the right direction — a small shortcut that saves you a few minutes.",
          "choices": [
            {
              "label": "Head to the stream",
              "to": "stream"
            }
          ]
        },
        "stream": {
          "text": "At the stream, you must make the water safe to drink before you can carry on.",
          "choices": [
            {
              "label": "Boil the water over the campfire",
              "to": "navigate"
            },
            {
              "label": "Use the purification tablets from your kit",
              "to": "navigate"
            }
          ]
        },
        "navigate": {
          "text": "With water and <span class=\"gw\" data-def=\"a place that protects you from bad weather\" data-emoji=\"⛺\">shelter</span> sorted, it's time for the final challenge: reach the flag using only a map and compass.",
          "choices": [
            {
              "label": "Take the direct route through the forest",
              "to": "forest_route"
            },
            {
              "label": "Take the longer, clearly marked trail",
              "to": "trail_route"
            }
          ]
        },
        "forest_route": {
          "text": "The forest is faster, but harder to read. After ten minutes, you realise you might be going the wrong way.",
          "choices": [
            {
              "label": "Use your compass to correct your course",
              "to": "compass_fix"
            },
            {
              "label": "Keep guessing the direction",
              "to": "guess"
            }
          ]
        },
        "compass_fix": {
          "text": "The compass needle settles, and you adjust your path with confidence. Good navigation always beats good luck.",
          "choices": [
            {
              "label": "Head to the finish line",
              "to": "rival"
            }
          ]
        },
        "guess": {
          "text": "Still guessing, you push through some thick <span class=\"gw\" data-def=\"small plants and bushes growing under trees\" data-emoji=\"🌿\">undergrowth</span> — and freeze. Just ahead, two students from Team Falcon are quietly moving the finish flag closer to their own path.",
          "choices": [

            {

          "choices": [
            {
              "label": "Head to the finish line",
              "to": "rival"
            }
          ]

        "rival": {
          "text": "Near the finish, Team Falcon is celebrating — they finished suspiciously fast. Something about their story doesn't quite add up.",
          "choices": [

              "label": "Focus on finishing your own challenge",
              "to": "finish_clean"
            },
            {
              "label": "Investigate what Team Falcon actually did",
              "to": "investigate"

          ]
        },
        "investigate": {
          "text": "Behind the finish flag, you spot fresh <span class=\"gw\" data-def=\"marks left behind by feet\" data-emoji=\"👣\">footprints</span> leading off the marked trail — proof the flag was moved.",
          "choices": [
            {
              "label": "Report it to the instructor",
              "to": "report"
            },
            {
              "label": "Stay quiet and finish your own challenge",
              "to": "finish_silent"
            }
          ]

        "finish_clean": {
          "text": "Your team crosses the finish line together, tired but proud. \"Every challenge, fair and square,\" the instructor says, handing you the Golden Compass.",

            "id": "e_compass",

            "title": "Golden Compass Earned",
            "titleFr": "Boussole d'or méritée",
            "xp": 90
          }

        "finish_silent": {
          "text": "You win the challenge, trophy in hand — but the smile feels a little smaller than you expected. Some victories are harder to enjoy than others.",

            "type": "neutral",
            "title": "A Quiet Victory",
            "titleFr": "Une victoire discrète",
            "xp": 55
          }
        },
        "report": {
          "text": "The instructor listens carefully, checks the evidence, and disqualifies Team Falcon. \"Camp isn't just about being first,\" she tells the whole group. \"It's about being <span class=\"gw\" data-def=\"truthful, not lying\" data-emoji=\"✅\">honest</span>, even when no one is watching.\" Your team's respect grows, trophy or not.",
          "ending": {
            "id": "e_fairplay",
            "type": "best",
            "title": "Fair Play Wins",
            "titleFr": "Le fair-play l'emporte",
            "xp": 130
          }
        }
      }
    },
    {
      "id": "vanishing-painting",
      "level": "4e",
      "title": "The Vanishing Painting",
      "titleFr": "Le tableau disparu",
      "blurb": "Pendant une sortie au musée, un petit tableau célèbre disparaît du mur. Le musée ferme bientôt — à toi de mener l'enquête.",
      "cecrl": "A2/B1",
      "estMinutes": 15,
      "start": "start",
      "nodes": {
        "start": {
          "text": "Your class is visiting the museum when you notice something wrong: the wall label for \"The Sapphire Garden\" is still there, but the painting itself is gone. Only a faint rectangle mark remains on the wallpaper.",
          "choices": [
            {
              "label": "Tell the museum guide immediately",
              "to": "guide"
            },
            {
              "label": "Look around quietly with your friend Theo first",
              "to": "quiet2"
            }
          ]
        },
        "guide": {
          "text": "The guide's face goes <span class=\"gw\" data-def=\"having less colour than usual, often from fear\" data-emoji=\"😰\">pale</span>, but she stays professional. \"Let's not panic the whole group,\" she says quietly, and calls security. \"You two noticed it first — want to help us look, calmly?\"",
          "choices": [
            {
              "label": "Join the guard's search",

        "quiet2": {
          "text": "You and Theo examine the <span class=\"gw\" data-def=\"containing nothing\" data-emoji=\"📦\">empty</span> frame closely. \"Look,\" he whispers, \"the little <span class=\"gw\" data-def=\"a device that detects movement or change\" data-emoji=\"📡\">sensor</span> by the frame — it's been unplugged, not broken. That's more suspicious than a simple malfunction.\"",
          "choices": [
            {
              "label": "Investigate the disconnected sensor together",
              "to": "sensor"

        "guard_search": {
          "text": "The security guard shows you the visitor log. A workman signed in that morning for \"restoration cleaning\" — earlier than any of the real cleaning staff usually arrive.",
          "choices": [
            {
              "label": "Ask to see the workman's ID badge records",
              "to": "records"
            },
            {
              "label": "Go check the restoration workshop downstairs",
              "to": "workshop"
            }
          ]
        },
        "sensor": {
          "text": "A disconnected <span class=\"gw\" data-def=\"a device that detects movement or change\" data-emoji=\"📡\">sensor</span> couldn't have happened by accident — someone must have done it <span class=\"gw\" data-def=\"done on purpose, not by accident\" data-emoji=\"🎯\">deliberately</span>, and recently.",
          "choices": [

              "label": "Check the museum shop for a closer look at the painting's details",
              "to": "shop"
            },
            {
              "label": "Go check the restoration workshop downstairs",
              "to": "workshop"
            }
          ]
        },
        "records": {
          "text": "The <span class=\"gw\" data-def=\"a card or symbol that shows who someone is\" data-emoji=\"🪪\">badge</span> records show a name that doesn't match any real member of staff. Whoever this \"workman\" was, he shouldn't have been in the building at all.",
          "choices": [
            {
              "label": "Head to the workshop with this new evidence",
              "to": "workshop"
            }
          ]
        },
        "shop": {
          "text": "In the gift shop, a postcard of the painting shows a tiny hidden signature in one corner — one that matches a fresh scratch you noticed on the <span class=\"gw\" data-def=\"containing nothing\" data-emoji=\"📦\">empty</span> frame. The frame itself must have been <span class=\"gw\" data-def=\"touched or changed something without permission\" data-emoji=\"🔧\">tampered</span> with, not just the canvas taken.",
          "choices": [
            {
              "label": "Head to the workshop with this new evidence",
              "to": "workshop"
            }
          ]
        },
        "workshop": {
          "text": "Downstairs, the real restoration staff look confused. \"Cleaning? No one scheduled any work for today.\" Whoever the \"workman\" was, he was never supposed to be here.",
          "choices": [
            {
              "label": "Search the workshop for clues right away",
              "to": "search_workshop"
            },
            {
              "label": "Report everything to the head of security immediately",
              "to": "report_security"
            }
          ]
        },
        "search_workshop": {
          "text": "Behind a laundry cart, you spot a flat package wrapped in cloth — exactly the right size for a small painting. <span class=\"gw\" data-def=\"the sound of someone walking\" data-emoji=\"👣\">Footsteps</span> echo somewhere nearby, getting closer.",
          "choices": [
            {
              "label": "Open the package to check what's inside",
              "to": "open_cart"
            },
            {
              "label": "Go get security before touching anything",
              "to": "get_security"
            }
          ]
        },
        "report_security": {
          "text": "The head of security takes full control, launching a proper search of the whole building. Hours later, the painting is found, undamaged, in a service lift. Whoever took it is never identified — but at least the museum's treasure is safe.",
          "ending": {
            "id": "e_unsolved",
            "type": "neutral",
            "title": "Recovered, but Unsolved",
            "titleFr": "Retrouvé, mais non résolu",
            "xp": 60
          }
        },
        "open_cart": {
          "text": "You <span class=\"gw\" data-def=\"to remove the covering from something\" data-emoji=\"🎁\">unwrap</span> it carefully — there it is, \"The Sapphire Garden\", completely safe. At that exact moment, <span class=\"gw\" data-def=\"the sound of someone walking\" data-emoji=\"👣\">footsteps</span> stop right behind you: the fake workman has come back for his package.",
          "choices": [
            {
              "label": "Confront him directly",
              "to": "confront_thief"
            },
            {
              "label": "Quietly signal to a nearby guard, without saying a word",
              "to": "signal_guard"
            }
          ]
        },
        "get_security": {
          "text": "Real security officers arrive fast and quiet. They catch the fake workman right as he returns for his hidden package. The painting is safe, and so are you and Theo — the professionals handled the rest.",
          "ending": {
            "id": "e_safe",
            "type": "good",
            "title": "The Painting Is Safe",
            "titleFr": "Le tableau est en sécurité",
            "xp": 100
          }
        },
        "confront_thief": {
          "text": "\"Stop right there!\" you shout — but the man <span class=\"gw\" data-def=\"pushes roughly\" data-emoji=\"🤚\">shoves</span> past you and slams the <span class=\"gw\" data-def=\"a room where things are made or repaired\" data-emoji=\"🔧\">workshop</span> door, locking you and Theo inside by accident. It takes twenty <span class=\"gw\" data-def=\"causing an uncomfortable, shy feeling\" data-emoji=\"😳\">embarrassing</span> minutes, and a lot of knocking, before someone finally lets you out. The painting is safe. The thief, unfortunately, is not caught.",
          "ending": {
            "id": "e_lockedin",
            "type": "funny",
            "title": "Locked In",
            "titleFr": "Enfermés",
            "xp": 40
          }
        },
        "signal_guard": {
          "text": "Without a word, you catch a guard's eye through the <span class=\"gw\" data-def=\"a room where things are made or repaired\" data-emoji=\"🔧\">workshop</span> window and point. Security moves in fast and silent, catching the fake workman completely by surprise. The painting — and the thief — are both recovered, thanks to you.",
          "ending": {
            "id": "e_caseclosed",
            "type": "best",
            "title": "Case Closed",
            "titleFr": "Affaire classée",
            "xp": 140
          }
        }
      }
    },
    {
      "id": "the-deepfake",
      "level": "3e",
      "title": "The Deepfake",
      "titleFr": "L'hypertrucage",
      "blurb": "Une fausse vidéo de toi devient virale au collège. Tu n'as jamais dit ces mots — mais comment le prouver avant que la rumeur ne devienne incontrôlable ?",
      "cecrl": "B1",
      "estMinutes": 17,
      "start": "start",
      "nodes": {
        "start": {
          "text": "You arrive at school to find people <span class=\"gw\" data-def=\"looking for a long time\" data-emoji=\"👀\">staring</span> and whispering. Someone shows you a video: it's your face, your voice, saying something cruel about your friend Maya. You never said this — but the video already has hundreds of views, and it is being shared faster by the minute.",
          "choices": [
            {
              "label": "Post an immediate denial online",
              "to": "deny"
            },
            {
              "label": "Find Maya first, to explain in person",
              "to": "maya_first"
            }
          ]
        },
        "deny": {
          "text": "Your <span class=\"gw\" data-def=\"refusing to admit that something is true\" data-emoji=\"🙅\">denial</span> gets some <span class=\"gw\" data-def=\"help and encouragement\" data-emoji=\"🤝\">support</span>, but also doubt. \"Sure, deny it now,\" one comment reads. Words alone, you realise, won't be enough — you need real <span class=\"gw\" data-def=\"facts that show something is definitely true\" data-emoji=\"🔍\">proof</span> that the video was faked.",
          "choices": [
            {
              "label": "Start investigating properly, with real evidence",
              "to": "investigate"
            }
          ]
        },
        "maya_first": {
          "text": "Maya is hurt and confused, but she agrees to listen. When you slow the clip down together, something sounds wrong — your voice glitches slightly around certain words, like it was built rather than recorded. Maya believes you.",
          "choices": [
            {
              "label": "Investigate together, now that Maya believes you",
              "to": "investigate_together"
            }
          ]
        },
        "investigate": {
          "text": "Alone, you study the video closely. Around your mouth, the video doesn't quite sync with the sound — a small but telling <span class=\"gw\" data-def=\"a small technical error or mistake\" data-emoji=\"🐞\">glitch</span>.",
          "choices": [
            {
              "label": "Search online for the app that could have made this",
              "to": "search_app"
            },
            {
              "label": "Ask the IT teacher for help",
              "to": "it_teacher"
            }
          ]
        },
        "investigate_together": {
          "text": "With Maya's help, the investigation moves faster. Two pairs of eyes catch details that one might have missed.",
          "choices": [
            {
              "label": "Search online for the app that could have made this",
              "to": "search_app"
            },
            {
              "label": "Ask the IT teacher for help",
              "to": "it_teacher"
            }
          ]
        },
        "search_app": {
          "text": "You find it: a <span class=\"gw\" data-def=\"popular and fashionable right now\" data-emoji=\"✨\">trendy</span> new \"voice-clone\" app, apparently popular at your school this month — the kind that could easily have been used to make the fake video.",
          "choices": [
            {
              "label": "Check who in your year has been posting about the app",
              "to": "social_trace"
            },
            {
              "label": "Report the video to the platform straight away",
              "to": "report_platform"
            }
          ]
        },
        "it_teacher": {
          "text": "The IT teacher confirms it: this is a deepfake, technically speaking, made by combining old video of you with a synthetic voice. \"This should be reported formally,\" she says. \"I'll help you take it to the headteacher.\"",
          "choices": [
            {
              "label": "Let the school take the investigation further",
              "to": "head_meeting"
            }
          ]
        },
        "social_trace": {
          "text": "In an old group chat, you find it: a classmate named Ollie <span class=\"gw\" data-def=\"talking with too much pride about yourself\" data-emoji=\"😎\">bragging</span> about \"testing the new app on random photos, just for a laugh.\"",
          "choices": [
            {
              "label": "Confront Ollie directly",
              "to": "confront_ollie"
            },
            {
              "label": "Bring the screenshot to a teacher",
              "to": "teacher_evidence"
            }
          ]
        },
        "report_platform": {
          "text": "The platform takes the video down within a day, which is a relief. But whoever actually made it is never identified at school, and quiet <span class=\"gw\" data-def=\"stories that spread between people, often not fully true\" data-emoji=\"🗣\">rumours</span> <span class=\"gw\" data-def=\"to stay somewhere longer than expected\" data-emoji=\"⏳\">linger</span> a little longer than they should have.",
          "ending": {
            "id": "e_takendown",
            "type": "neutral",
            "title": "Taken Down, Not Resolved",
            "titleFr": "Supprimée, mais pas résolue",
            "xp": 60
          }
        },
        "confront_ollie": {
          "text": "Ollie goes pale. \"It was meant to be a joke between friends,\" he admits. \"I didn't think it would actually spread like this. I'm really sorry.\"",
          "choices": [
            {
              "label": "Accept his apology privately and ask him to help fix it",
              "to": "ollie_fix"
            },
            {
              "label": "Insist that he must tell the teacher himself",
              "to": "ollie_confess"
            }
          ]
        },
        "teacher_evidence": {
          "text": "The teacher takes the screenshot seriously and immediately opens a formal investigation, involving the headteacher and the IT department.",
          "choices": [
            {
              "label": "Let the school take it from here",
              "to": "head_meeting"
            }
          ]
        },
        "ollie_fix": {
          "text": "Ollie posts a public correction, explaining clearly what he did and why it was wrong. You and Maya add your own message of <span class=\"gw\" data-def=\"help and encouragement\" data-emoji=\"🤝\">support</span>. The app itself gets reported and <span class=\"gw\" data-def=\"marked as a problem for someone to check\" data-emoji=\"🚩\">flagged</span> by several students. It isn't a perfect ending, but trust is slowly rebuilt.",
          "ending": {
            "id": "e_recordstraight",
            "type": "good",
            "title": "Setting the Record Straight",
            "titleFr": "Rétablir la vérité",
            "xp": 100
          }
        },
        "ollie_confess": {
          "text": "Ollie tells the headteacher himself, and the consequences are handled fairly, without public <span class=\"gw\" data-def=\"a strong feeling of shame or embarrassment\" data-emoji=\"😳\">humiliation</span>. The school later holds an <span class=\"gw\" data-def=\"a meeting of a whole school or group\" data-emoji=\"🏫\">assembly</span> about deepfakes and digital respect — the whole year learns something, not just Ollie.",
          "ending": {
            "id": "e_biggerlesson",
            "type": "best",
            "title": "A Bigger Lesson",
            "titleFr": "Une leçon plus grande",
            "xp": 150
          }
        },
        "head_meeting": {
          "text": "The headteacher addresses the situation calmly but <span class=\"gw\" data-def=\"in a strong, steady way\" data-emoji=\"💪\">firmly</span>, and holds an <span class=\"gw\" data-def=\"a meeting of a whole school or group\" data-emoji=\"🏫\">assembly</span> on digital respect and deepfakes. Using the IT teacher's technical trace, Ollie is identified and admits what he did. The school responds — clearly, and as a community.",
          "ending": {
            "id": "e_schoolresponds",
            "type": "good",
            "title": "The School Responds",
            "titleFr": "Le collège réagit",
            "xp": 95
          }
        }
      }
    },
    {
      "id": "dragons-egg",
      "level": "6e",
      "title": "Quest for the Dragon's Egg",
      "titleFr": "La quête de l'œuf de dragon",
      "blurb": "Des corbeaux malicieux ont volé l'œuf du dragon gardien du village. Retrouve-le dans la Forêt des Murmures avant la tombée de la nuit !",
      "cecrl": "A1",
      "estMinutes": 13,
      "start": "start",
      "nodes": {
        "start": {
          "text": "The village elder looks worried. \"Naughty crows stole the <span class=\"gw\" data-def=\"someone or something that protects\" data-emoji=\"🛡\">guardian</span> dragon's egg last night,\" she says, \"and hid it somewhere in the Whispering Forest. Without it, our dragon cannot rest. Please, find it before nightfall!\"",
          "choices": [
            {
              "label": "Search the forest with your friend Tom",
              "to": "forest"

            {
              "label": "Ask the old wizard for a magic clue first",

        },
        "wizard": {
          "text": "The wizard closes his eyes and <span class=\"gw\" data-def=\"speaks quietly and unclearly\" data-emoji=\"🤫\">mutters</span> a short <span class=\"gw\" data-def=\"words that sound similar, often used in poems\" data-emoji=\"🎶\">rhyme</span>. \"Where water sleeps, or branches climb — one of these holds what you seek.\"",

              "to": "cave"
