            {
              "label": "Follow the clue to the old oak tree",
              "to": "oak"
            }
          ]
        },
        "forest": {
          "text": "The Whispering Forest is cool and green. Two clues catch your attention.",
          "choices": [
            {
              "label": "Follow the crow feathers on the ground",
              "to": "feathers"
            },
            {
              "label": "Follow the sound of a strange, beautiful song",
              "to": "song"
            }
          ]
        },
        "feathers": {
          "text": "The feathers lead deeper into the trees, toward a noisy crow's nest, high above.",
          "choices": [
            {
              "label": "Head toward the crow's nest",
              "to": "nest"
            }
          ]
        },
        "song": {
          "text": "A tiny forest fairy appears, humming softly. \"Lost something, traveller?\" she asks with a smile.",
          "choices": [
            {
              "label": "Accept the fairy's help",
              "to": "fairy_help"
            },
            {
              "label": "Politely decline and continue alone",
              "to": "alone"
            }
          ]
        },
        "fairy_help": {
          "text": "\"I know exactly where to look,\" the fairy says, and leads you straight toward an enormous old oak tree.",
          "choices": [
            {
              "label": "Follow the fairy to the old oak tree",
              "to": "oak"
            }
          ]
        },
        "alone": {
          "text": "You wander a little, and soon hear the sound of running water. It leads you toward a dark cave.",
          "choices": [
            {
              "label": "Follow the sound to the cave",
              "to": "cave"
            }
          ]
        },
        "cave": {
          "text": "The river cave is dark and <span class=\"gw\" data-def=\"sounds that repeat after bouncing off a surface\" data-emoji=\"🔊\">echoes</span> strangely.",
          "choices": [
            {
              "label": "Light a torch and go inside",
              "to": "cave_in"
            },
            {
              "label": "Call out to see if anyone answers",
              "to": "call"
            }

        "cave_in": {
          "text": "Inside, you find a family of sleepy bats, not an egg. But when you explain your <span class=\"gw\" data-def=\"an important journey to find or achieve something\" data-emoji=\"🗺\">quest</span>, they chitter and point their wings toward an old oak tree in the distance.",
          "choices": [
            {
              "label": "Follow the bats' lead to the oak tree",
              "to": "oak"
            }
          ]
        },
        "call": {
          "text": "Your voice <span class=\"gw\" data-def=\"sounds that repeat after bouncing off a surface\" data-emoji=\"🔊\">echoes</span>... and echoes... until, finally, a deep friendly voice answers: a cave troll! \"<span class=\"gw\" data-def=\"bright, reflecting light\" data-emoji=\"✨\">Shiny</span> egg? Crows flew past here, toward their nest, not long ago.\"",
          "choices": [
            {
              "label": "Thank the troll and follow his directions",
              "to": "troll_help"
            },
            {
              "label": "It's getting late — give up and head back to the village",
              "to": "give_up"
            }
          ]
        },
        "troll_help": {
          "text": "The troll's directions are perfect. You soon spot a noisy crow's nest ahead.",
          "choices": [
            {
              "label": "Approach the crow's nest carefully",
              "to": "nest"
            }
          ]
        },
        "give_up": {
          "text": "You walk back to the village, tired and empty-handed. The elder smiles kindly. \"The forest is big, and you tried your best. The dragon can wait one more day — try again tomorrow, wiser than today.\"",
          "ending": {
            "id": "e_giveup",
            "type": "neutral",
            "title": "Back Empty-Handed, But Wiser",
            "titleFr": "Bredouille, mais plus sage",
            "xp": 45
          }
        },
        "oak": {
          "text": "High in the old oak tree, a <span class=\"gw\" data-def=\"a black-and-white bird that likes shiny things\" data-emoji=\"🐦\">magpie</span>'s nest glints with something golden and round.",
          "choices": [
            {
              "label": "Climb the tree carefully yourself",
              "to": "climb_tree"
            },
            {
              "label": "Ask a passing woodcutter for help",
              "to": "woodcutter"
            }
          ]
        },
        "climb_tree": {
          "text": "Slowly, carefully, you climb up branch by branch. At the top, wrapped safely in <span class=\"gw\" data-def=\"small, thin branches\" data-emoji=\"🌿\">twigs</span>, sits the dragon's egg! You climb down, proud and a little shaky.",
          "ending": {
            "id": "e_climb",
            "type": "good",
            "title": "Egg Retrieved by Hand",
            "titleFr": "L'œuf récupéré à la force des bras",
            "xp": 85
          }

        "woodcutter": {
          "text": "\"Need a hand?\" laughs the <span class=\"gw\" data-def=\"a person who cuts down trees for wood\" data-emoji=\"🪓\">woodcutter</span>, setting up his tall <span class=\"gw\" data-def=\"a structure with steps, used for climbing up or down\" data-emoji=\"🪜\">ladder</span>. Together, you climb safely and bring the egg down without a single <span class=\"gw\" data-def=\"a small injury on the skin from rubbing against something\" data-emoji=\"🩹\">scrape</span>. You even help him carry firewood back to the village afterward — a new friend made along the way.",
          "ending": {
            "id": "e_woodcutter",
            "type": "best",
            "title": "Together We Rise",
            "titleFr": "Ensemble, on va plus haut",
            "xp": 100
          }
        },
        "nest": {
          "text": "The crows guard their nest fiercely, cawing loudly at your approach.",
          "choices": [
            {
              "label": "Offer the crows a trade of shiny buttons",
              "to": "trade"
            },
            {
              "label": "Sneak past quietly while they're distracted",
              "to": "sneak"
            }

        "trade": {
          "text": "You lay out your <span class=\"gw\" data-def=\"bright, reflecting light\" data-emoji=\"✨\">shiny</span> buttons. The crows hop closer, curious, and happily swap the egg for their new treasures. A fair <span class=\"gw\" data-def=\"to exchange one thing for another\" data-emoji=\"🔄\">trade</span>, and everyone leaves <span class=\"gw\" data-def=\"pleased because you got what you wanted\" data-emoji=\"😊\">satisfied</span>.",
          "ending": {

            "type": "good",
            "title": "A Fair Trade",
            "titleFr": "Un échange équitable",
            "xp": 90
          }
        },
        "sneak": {
          "text": "You creep closer... closer... and grab the egg! The crows notice immediately and chase you all the way through the forest, squawking furiously. You escape, egg safely in your arms — but you lose your hat somewhere along the way.",
          "ending": {
            "id": "e_sneak",
            "type": "funny",
            "title": "Chased by Crows",
            "titleFr": "Poursuivi par les corbeaux",
            "xp": 50
          }
        }
      }
    },
    {
      "id": "shipwrecked-kestrel",
      "level": "5e",
      "title": "Shipwrecked on Kestrel Island",
      "titleFr": "Naufragés sur l'île de Kestrel",
      "blurb": "Une tempête fait chavirer votre bateau pendant une sortie scolaire en mer. Avec deux camarades, il faut trouver de l'eau et se faire secourir avant la nuit.",
      "cecrl": "A2",
      "estMinutes": 16,
      "start": "start",
      "nodes": {
        "start": {
          "text": "A sudden <span class=\"gw\" data-def=\"very bad weather, with strong wind and rain\" data-emoji=\"⛈\">storm</span> hit your school sailing trip, and your small boat <span class=\"gw\" data-def=\"turned over in the water\" data-emoji=\"🌊\">capsized</span>. You wake up on a sandy beach with your classmates Jamal and Sofia. The boat is wrecked, and your phones are soaked and useless.",
          "choices": [

            {

              "to": "inland"
            }
          ]
        },
        "beach": {
          "text": "Pieces of the wrecked boat are <span class=\"gw\" data-def=\"spread out in different, untidy places\" data-emoji=\"💨\">scattered</span> along the sand.",
          "choices": [
            {

          "choices": [
            {
              "label": "Head inland to find fresh water",
              "to": "inland"

          "text": "The island's interior is thick with trees. Two options stand out.",

      "title": "The Last River",
      "titleFr": "La dernière rivière",

          "text": "With help from a friend who cleans AquaCorp's offices part-time, you find internal allocation reports. They show clearly: <span class=\"gw\" data-def=\"having more money\" data-emoji=\"💰\">wealthier</span> districts have <span class=\"gw\" data-def=\"without making noise\" data-emoji=\"🤫\">quietly</span> been receiving more water than official rationing rules allow.",

          "choices": [

              "label": "Tiptoe very carefully",
              "to": "tiptoe_success"
            },
            {
              "label": "Grab it quickly and run",
              "to": "grab_run"
            }
          ]
        },
        "tiptoe_success": {
          "text": "You lift the crystal without a single sound, and slip out of the cave before the goblin even <span class=\"gw\" data-def=\"moves slightly, especially when almost waking up\" data-emoji=\"🌀\">stirs</span>. A silent, perfect rescue.",
          "ending": {
            "id": "e_silent",
            "type": "good",
            "title": "A Silent Rescue",
            "titleFr": "Un sauvetage silencieux",
            "xp": 90
          }
        },
        "grab_run": {
          "text": "You grab the crystal and run! The goblin wakes with a surprised shout and chases you all the way through the woods, giggling the whole time. You escape, crystal safely in hand, completely out of breath.",
          "ending": {
            "id": "e_chase6",
            "type": "funny",
            "title": "The Goblin Chase",
            "titleFr": "La poursuite du gobelin",
            "xp": 50
          }
        },
        "ask_nicely": {
          "text": "The goblin blinks awake, <span class=\"gw\" data-def=\"suddenly surprised or shocked\" data-emoji=\"😲\">startled</span> — then surprised. \"Nobody's ever just... asked before,\" he mutters, scratching his head.",
          "choices": [
            {
              "label": "Offer a trade for the crystal",
              "to": "trade6"
            },
            {
              "label": "Just ask kindly and explain the danger",
              "to": "kind_ask"
            }
          ]
        },
        "trade6": {
          "text": "You offer your shiny <span class=\"gw\" data-def=\"a decorative pin worn on clothes\" data-emoji=\"📌\">brooch</span> in exchange. The goblin's eyes light up, and he happily <span class=\"gw\" data-def=\"exchanges one thing for another\" data-emoji=\"🔄\">swaps</span> it for the crystal. Fair trade, both sides smiling.",
          "ending": {
            "id": "e_trade6",
            "type": "good",
            "title": "A Trade in Emberhold",
            "titleFr": "Un échange à Emberhold",
            "xp": 85
          }
        },
        "kind_ask": {
          "text": "You explain gently why the kingdom needs the crystal. The goblin, touched that someone finally asked instead of shouting, hands it over — and asks, shyly, if he could visit the tower sometime. A new, mischievous friend for Emberhold.",
          "ending": {
            "id": "e_friend6",
            "type": "best",
            "title": "New Friend at Emberhold",
            "titleFr": "Un nouvel ami à Emberhold",
            "xp": 110
          }
        }
      }
    },
    {
      "id": "frost-king-sword",
      "level": "5e",
      "title": "The Sword of the Frost King",
      "titleFr": "L'épée du Roi du Givre",
      "blurb": "Des trolls des glaces avancent vers le village. Seule l'épée légendaire cachée dans la forteresse gelée du Roi du Givre peut les arrêter.",
      "cecrl": "A2",
      "estMinutes": 17,
      "start": "start",
      "nodes": {
        "start": {
          "text": "The captain of the guard explained that ice trolls were marching toward the village, and only the legendary Frostbrand sword could stop them. It was hidden somewhere in the ruined <span class=\"gw\" data-def=\"a strong building built for defence\" data-emoji=\"🏰\">fortress</span> on Frost Peak.",
          "choices": [
            {
              "label": "Take the steep mountain path",
              "to": "steep_path"
            },
            {
              "label": "Take the longer forest path around the mountain",
              "to": "forest_path5"
            }
          ]
        },
        "steep_path": {
          "text": "The steep path was fast, but the rocks were covered in ice.",
          "choices": [
            {
              "label": "Climb carefully, testing each foothold",
              "to": "climb_careful"
            },
            {
              "label": "Climb quickly, before the wind got worse",
              "to": "climb_fast"
            }
          ]
        },
        "climb_careful": {
          "text": "You climbed slowly and safely, arriving tired but unharmed near the <span class=\"gw\" data-def=\"a strong building built for defence\" data-emoji=\"🏰\">fortress</span> gate.",
          "choices": [
            {
              "label": "Approach the fortress gate",
              "to": "fortress_gate"
            }
          ]
        },
        "climb_fast": {
          "text": "Halfway up, your boot slipped on the ice!",
          "choices": [
            {
              "label": "Grab onto a jutting rock",
              "to": "grab_rock"
            },
            {
              "label": "Let yourself slide to a lower ledge",
              "to": "slide_ledge"
            }
          ]
        },
        "grab_rock": {
          "text": "You caught the rock just in time, heart pounding, and pulled yourself back up safely.",
          "choices": [
            {
              "label": "Approach the fortress gate",
              "to": "fortress_gate"
            }
          ]
        },
        "slide_ledge": {
          "text": "You slid down to a lower ledge, <span class=\"gw\" data-def=\"not injured\" data-emoji=\"✅\">unhurt</span> but <span class=\"gw\" data-def=\"feeling nervous or upset after a shock\" data-emoji=\"😰\">shaken</span>, and had to find another way up, losing some time.",
          "choices": [
            {
              "label": "Approach the fortress gate, a little late",
              "to": "fortress_gate"
            }
          ]
        },
        "forest_path5": {
          "text": "The forest path was calmer. Along the way, you met an old hermit sitting by a small fire.",
          "choices": [
            {
              "label": "Ask the hermit for advice",
              "to": "hermit_advice"
            },
            {
              "label": "Continue without stopping",
              "to": "continue_alone"
            }
          ]
        },
        "hermit_advice": {
          "text": "\"The <span class=\"gw\" data-def=\"a strong building built for defence\" data-emoji=\"🏰\">fortress</span> <span class=\"gw\" data-def=\"someone or something that protects a place\" data-emoji=\"🛡\">guardian</span> asks a <span class=\"gw\" data-def=\"a puzzle with a clever, hidden answer\" data-emoji=\"🧩\">riddle</span> at the gate,\" the hermit warned. \"And beware the ice wolves in the great hall — they respect calm more than courage.\"",
          "choices": [
            {
              "label": "Head to the fortress gate",
              "to": "fortress_gate"
            }
          ]
        },
        "continue_alone": {
          "text": "You continued on, alone, without any warning of what awaited inside.",
          "choices": [
            {
              "label": "Head to the fortress gate",
              "to": "fortress_gate"
            }
          ]
        },
        "fortress_gate": {
          "text": "The <span class=\"gw\" data-def=\"a strong building built for defence\" data-emoji=\"🏰\">fortress</span> gate stood frozen shut, massive and ancient.",
          "choices": [
            {
              "label": "Look for a side entrance",
              "to": "side_entrance"
            },
            {
              "label": "Call out and ask the gate guardian to let you in",
              "to": "call_guardian"
            }
          ]
        },
        "side_entrance": {
          "text": "You found a narrow crack in the ice wall and squeezed through, into a cold, <span class=\"gw\" data-def=\"making a sound that repeats and repeats\" data-emoji=\"🔊\">echoing</span> hall.",
          "choices": [
            {
              "label": "Enter the hall",
              "to": "hall"
            }
          ]
        },
        "call_guardian": {
          "text": "A stone <span class=\"gw\" data-def=\"someone or something that protects a place\" data-emoji=\"🛡\">guardian</span> slowly opened its eyes. \"Answer my <span class=\"gw\" data-def=\"a puzzle with a clever, hidden answer\" data-emoji=\"🧩\">riddle</span>,\" it <span class=\"gw\" data-def=\"made a deep, low sound\" data-emoji=\"🔊\">rumbled</span>, \"or you shall not pass.\"",
          "choices": [
            {
              "label": "Answer the riddle",
              "to": "riddle_answer"
            },
            {
              "label": "Admit you don't know, and ask for a hint",
              "to": "riddle_hint"
            }
          ]
        },
        "riddle_answer": {
          "text": "Your answer was correct! The <span class=\"gw\" data-def=\"someone or something that protects a place\" data-emoji=\"🛡\">guardian</span> nodded slowly and stepped aside, letting the frozen gate creak open.",
          "choices": [
            {
              "label": "Enter the hall",
              "to": "hall"
            }
          ]
        },
        "riddle_hint": {
          "text": "The <span class=\"gw\" data-def=\"someone or something that protects a place\" data-emoji=\"🛡\">guardian</span> considered your honesty, and offered a small hint.",
          "choices": [
            {
              "label": "Use the hint to answer carefully",
              "to": "riddle_answer2"
            },
            {
              "label": "Get impatient and try to push past the guardian",
              "to": "push_guardian"
            }
          ]
        },
        "riddle_answer2": {
          "text": "With the hint, you worked out the answer, and the <span class=\"gw\" data-def=\"someone or something that protects a place\" data-emoji=\"🛡\">guardian</span> let you through, satisfied.",
          "choices": [
            {
              "label": "Enter the hall",
              "to": "hall"
            }
          ]
        },
        "push_guardian": {
          "text": "Offended, the <span class=\"gw\" data-def=\"someone or something that protects a place\" data-emoji=\"🛡\">guardian</span> froze the door shut for a full hour. By the time you finally got inside, precious time had been lost — and, far below, the ice trolls were already reaching the village walls.",
          "ending": {
            "id": "e_delay5",
            "type": "neutral",
            "title": "A Costly Delay",
            "titleFr": "Un retard coûteux",
            "xp": 60
          }
        },
        "hall": {
          "text": "In the grand icy hall, the Frostbrand sword rested on a pedestal of pale blue ice — guarded by two watchful ice wolves.",
          "choices": [
            {
              "label": "Distract the wolves with a thrown object",
              "to": "distract_wolves"
            },
            {
              "label": "Try to sneak past them quietly",
              "to": "sneak_wolves"
            }
          ]
        },
        "distract_wolves": {
          "text": "You tossed a piece of ice across the hall. Both wolves turned, chasing after it with delight, giving you a clear path to the sword.",
          "choices": [
            {
              "label": "Grab the sword calmly",
              "to": "sword_take"
            }
          ]
        },
        "sword_take": {
          "text": "You lifted the Frostbrand sword carefully from its pedestal, and slipped out of the <span class=\"gw\" data-def=\"a strong building built for defence\" data-emoji=\"🏰\">fortress</span> with your prize, ready to defend the village.",
          "ending": {
            "id": "e_retrieved5",
            "type": "good",
            "title": "The Frostbrand Retrieved",
            "titleFr": "Le Fer du Givre récupéré",
            "xp": 90
          }
        },
        "sneak_wolves": {
          "text": "You crept forward slowly — but one wolf's ears flicked up, and both turned to face you, <span class=\"gw\" data-def=\"making a low, threatening sound\" data-emoji=\"🐺\">growling</span> low.",
          "choices": [
            {
              "label": "Stand your ground and speak calmly",
              "to": "stand_calm"
            },
            {
              "label": "Run for the pedestal",
              "to": "run_pedestal"
            }
          ]
        },
        "stand_calm": {
          "text": "You stood still, spoke softly, and held their gaze. Slowly, the wolves' ears relaxed. They stepped aside, almost respectfully, and even escorted you safely to the <span class=\"gw\" data-def=\"a strong building built for defence\" data-emoji=\"🏰\">fortress</span> gate afterward.",
          "ending": {
            "id": "e_respect5",
            "type": "best",
            "title": "Respect of the Frost Wolves",
            "titleFr": "Le respect des loups du givre",
            "xp": 140
          }
        },
        "run_pedestal": {
          "text": "You sprinted for the sword, wolves snapping at your heels! You grabbed the <span class=\"gw\" data-def=\"the handle of a sword\" data-emoji=\"🗡\">hilt</span> and <span class=\"gw\" data-def=\"ran quickly and suddenly\" data-emoji=\"💨\">dashed</span> for the exit, cloak torn but sword secured, laughing with relief once safely outside.",
          "ending": {
            "id": "e_narrow5",
            "type": "funny",
            "title": "A Narrow Escape",
            "titleFr": "Une évasion de justesse",
            "xp": 55
          }
        }
      }
    },
    {
      "id": "last-spellbinder",
      "level": "4e",
      "title": "The Last Spellbinder",
      "titleFr": "Le dernier enchanteur",
      "blurb": "Dans le royaume de Virelle, la magie s'affaiblit de jour en jour. Découvre qui — ou quoi — la draine avant qu'elle ne disparaisse pour de bon.",
      "cecrl": "A2/B1",
      "estMinutes": 17,
      "start": "start",
      "nodes": {
        "start": {
          "text": "Master Corvin looked <span class=\"gw\" data-def=\"worried or upset\" data-emoji=\"😟\">troubled</span>. \"Magic has grown far weaker than it used to be,\" he said. \"Spells that should be simple now barely work. Something must be draining it from the Wellspring, the ancient source beneath our guild.\"",
          "choices": [
            {
              "label": "Investigate the Wellspring chamber directly",
              "to": "wellspring"
            },
            {
              "label": "Consult the guild's ancient records first",
              "to": "records"
            }
          ]
        },
        "records": {
          "text": "The old records mention a similar event, centuries ago, caused by a hidden \"leyline breach\" — a crack that could let magic leak away.",
          "choices": [
            {
              "label": "Search the old maps for leyline locations",
              "to": "leyline"
            },
            {
              "label": "Ask the guild's oldest mage for her memory of it",
              "to": "oldmage"
            }
          ]
        },
        "leyline": {
          "text": "The old maps point toward the Sunken Grove, an overgrown forest not far from the guild.",
          "choices": [
            {
              "label": "Head to the Sunken Grove",
              "to": "grove"
            }
          ]
        },
        "oldmage": {
          "text": "The elderly mage's eyes <span class=\"gw\" data-def=\"here: the eyes almost closing, often showing suspicion\" data-emoji=\"🧐\">narrow</span>. \"Last time, it wasn't an accident,\" she says quietly. \"Someone was using <span class=\"gw\" data-def=\"not allowed\" data-emoji=\"🚫\">forbidden</span> draining magic for personal power.\" A troubling thought forms in your mind.",
          "choices": [
            {
              "label": "Follow this suspicion further",
              "to": "suspect"
            }
          ]
        },
        "wellspring": {
          "text": "In the chamber, the Wellspring's light looks dimmer and more clouded than it should be, with faint drain-marks leading out through a side tunnel.",
          "choices": [
            {
              "label": "Follow the drain-marks through the tunnel",
              "to": "tunnel"
            },
            {
              "label": "Report it to Master Corvin immediately",
              "to": "reportcorvin"
            }
          ]
        },
        "tunnel": {
          "text": "The tunnel leads outside, winding toward the edge of the Sunken Grove.",
          "choices": [
            {
              "label": "Follow the tunnel to the Sunken Grove",
              "to": "grove"
            }
          ]
        },
        "reportcorvin": {
          "text": "Corvin listens carefully, his face <span class=\"gw\" data-def=\"very serious\" data-emoji=\"😐\">grave</span>. \"We should investigate this together,\" he decides.",
          "choices": [
            {
              "label": "Go to the Sunken Grove together",
              "to": "grovetogether"
            },
            {
              "label": "Check the guild members' recent movements first",
              "to": "suspectcheck"
            }
          ]
        },
        "grovetogether": {
          "text": "With Corvin at your side, you both head toward the Sunken Grove, more confident with company.",
          "choices": [
            {
              "label": "Search the grove together",
              "to": "grove"
            }
          ]
        },
        "suspectcheck": {
          "text": "The guild's <span class=\"gw\" data-def=\"a record of who was present\" data-emoji=\"📋\">attendance</span> records reveal something odd: a member named Fenwick has been absent at strange hours for weeks.",
          "choices": [
            {
              "label": "Follow this new lead",
              "to": "suspect"
            }
          ]
        },
        "suspect": {
          "text": "Fenwick's name keeps surfacing — quiet, capable, and recently very <span class=\"gw\" data-def=\"keeping things hidden from others\" data-emoji=\"🤫\">secretive</span>. Something about the Sunken Grove connects to all of this.",
          "choices": [
            {
              "label": "Head to the Sunken Grove to investigate further",
              "to": "grove"
            }
          ]
        },
        "grove": {
          "text": "Deep in the grove, hidden beneath the roots of an ancient tree, you find a ritual circle — actively draining magic into a glowing crystal.",
          "choices": [
            {
              "label": "Destroy the ritual circle immediately",
              "to": "destroycircle"
            },
            {
              "label": "Wait and see who comes to collect the magic",
              "to": "waitwatch"
            }
          ]
        },
        "destroycircle": {
          "text": "You shatter the circle's central stone — and the drained magic <span class=\"gw\" data-def=\"sudden, powerful bursts of energy\" data-emoji=\"⚡\">surges</span> wildly outward, far more powerful and <span class=\"gw\" data-def=\"likely to change suddenly or become dangerous\" data-emoji=\"⚠\">unstable</span> than any spell you've handled before!",
          "choices": [
            {
              "label": "Try to redirect the surge safely",
              "to": "redirectsurge"
            },
            {
              "label": "Run for cover and let it dissipate naturally",
              "to": "runcover"
            }
          ]
        },
        "redirectsurge": {
          "text": "With steady hands and careful focus, you guide the wild surge safely back into the Wellspring below. Balance is restored, more completely and more quickly than anyone expected. Word of the young spellbinder who saved Virelle's magic spreads fast.",
          "ending": {
            "id": "e_surge4",
            "type": "best",
            "title": "Master of the Surge",
            "titleFr": "Maître de la vague magique",
            "xp": 140
          }
        },
        "runcover": {
          "text": "You duck behind a fallen tree as the surge crackles and fades on its own. It's safer, but messier — magic returns to Virelle slowly, over the following weeks, rather than all at once.",
          "ending": {
            "id": "e_partial4",
            "type": "good",
            "title": "A Partial Fix",
            "titleFr": "Une solution partielle",
            "xp": 85
          }
        },
        "waitwatch": {
          "text": "Hidden behind a tree, you watch as Fenwick himself arrives to collect the crystal, looking anxious and <span class=\"gw\" data-def=\"extremely tired\" data-emoji=\"🥱\">exhausted</span>.",
          "choices": [
            {
              "label": "Confront Fenwick directly",
              "to": "confrontfenwick"
            },
            {
              "label": "Secretly follow him, to see who he answers to",
              "to": "followfenwick"
            }
          ]
        },
        "confrontfenwick": {
          "text": "Cornered, Fenwick's shoulders <span class=\"gw\" data-def=\"to droop or sink downward\" data-emoji=\"📉\">sag</span>. \"I was being <span class=\"gw\" data-def=\"threatened into doing something by someone holding a secret against you\" data-emoji=\"🗝\">blackmailed</span>,\" he admits, \"by an agent from a rival kingdom. I never wanted to do this.\"",
          "choices": [
            {
              "label": "Help him undo it and report the blackmail together",
              "to": "undotogether"
            },
            {
              "label": "Turn him in immediately to the guild authorities",
              "to": "turnin"
            }
          ]
        },
        "undotogether": {
          "text": "Together, you reverse the ritual and report the blackmailer to the guild. Fenwick receives protection and a second chance; the guild grows stronger, having chosen compassion over punishment.",
          "ending": {
            "id": "e_redemption4",
            "type": "good",
            "title": "Redemption at the Wellspring",
            "titleFr": "Rédemption à la Source",
            "xp": 120
          }
        },
        "turnin": {
          "text": "Fenwick is arrested on the spot. Magic slowly stabilizes, but without addressing the blackmailer, who remains free and unpunished, a nagging sense of unfinished business remains.",
          "ending": {
            "id": "e_justice4",
            "type": "neutral",
            "title": "Justice, Unfinished",
            "titleFr": "Justice inachevée",
            "xp": 65
          }
        },
        "followfenwick": {
          "text": "Tailing him through the shadows, you discover the rival kingdom's agent waiting nearby — proof of a much larger plot than one desperate apprentice. This evidence changes everything for the guild's investigation.",
          "ending": {
            "id": "e_bigpicture4",
            "type": "best",
            "title": "The Bigger Picture",
            "titleFr": "Une affaire bien plus vaste",
            "xp": 150
          }
        }
      }
    },
    {
      "id": "crown-two-kingdoms",
      "level": "3e",
      "title": "Crown of Two Kingdoms",
      "titleFr": "La couronne des deux royaumes",
      "blurb": "Ton petit royaume d'Ashford est pris entre deux grandes puissances rivales au bord de la guerre pour une vallée disputée. La paix est entre tes mains.",
      "cecrl": "B1",
      "estMinutes": 18,
      "start": "start",
      "nodes": {
        "start": {
          "text": "You are summoned to the royal court of Ashford. The King explains that Meridia and Thornwall are both preparing for war over the Silverleaf Valley — and that Ashford, caught between them, could be destroyed if war began. You are sent as an <span class=\"gw\" data-def=\"a messenger sent to represent one's country or group\" data-emoji=\"🕊\">envoy</span> to seek peace.",
          "choices": [
            {
              "label": "Travel first to Meridia's court",
              "to": "meridia"
            },
            {
              "label": "Travel first to Thornwall's court",
              "to": "thornwall"
            }
          ]
        },
        "meridia": {
          "text": "Queen Isolde of Meridia claims the valley was promised to her ancestors by an old <span class=\"gw\" data-def=\"a formal written agreement between countries\" data-emoji=\"📜\">treaty</span>, said to have been lost long ago.",
          "choices": [
            {
              "label": "Ask to see any surviving copy of the treaty",
              "to": "meridia_treaty"
            },
            {
              "label": "Ask about Thornwall's version of events",
              "to": "meridia_ask_rival"
            }
          ]
        },
        "meridia_treaty": {
          "text": "Her <span class=\"gw\" data-def=\"people who study a subject deeply\" data-emoji=\"🎓\">scholars</span> search the archives and find a fragment — incomplete, but <span class=\"gw\" data-def=\"hinting at something without saying it clearly\" data-emoji=\"🤔\">suggestive</span> of something more than either side has admitted.",
          "choices": [
            {
              "label": "Follow this lead to an independent historian",
              "to": "scholar_lead"
            }
          ]
        },
        "meridia_ask_rival": {
          "text": "Isolde's expression hardens. \"Thornwall's king would say anything to keep that valley,\" she says coldly.",
          "choices": [
            {
              "label": "Travel to Thornwall's court next",
              "to": "thornwall"
            }
          ]
        },
        "thornwall": {
          "text": "Duke Aldric of Thornwall <span class=\"gw\" data-def=\"says something firmly, refusing to change one's mind\" data-emoji=\"💬\">insists</span> his people have defended the valley for generations, and suspects Meridia only wants its rare silver mines.",
          "choices": [
            {
              "label": "Ask about the disputed treaty Meridia mentioned",
              "to": "thornwall_treaty"
            },
            {
              "label": "Ask what Thornwall would accept to avoid war",
              "to": "thornwall_terms"
            }
          ]
        },
        "thornwall_treaty": {
          "text": "Aldric <span class=\"gw\" data-def=\"laughs in a way that shows disbelief\" data-emoji=\"😏\">scoffs</span>. \"If such a <span class=\"gw\" data-def=\"a formal written agreement between countries\" data-emoji=\"📜\">treaty</span> exists,\" he says, \"it was probably <span class=\"gw\" data-def=\"made illegally, to trick people (a fake document)\" data-emoji=\"✍\">forged</span>.\" Still, something in his tone suggests he isn't entirely certain.",
          "choices": [
            {
              "label": "Follow this lead to an independent historian",
              "to": "scholar_lead"
            }
          ]
        },
        "thornwall_terms": {
          "text": "Quietly, almost <span class=\"gw\" data-def=\"unwillingly, without really wanting to\" data-emoji=\"😔\">reluctantly</span>, Aldric admits he would accept shared access to the mines — if it were proposed carefully, without either side losing face publicly.",
          "choices": [
            {
              "label": "This could be the opening you need",
              "to": "shared_idea"
            }
          ]
        },
        "scholar_lead": {

<script>
(function(){
  "use strict";

  var DATA = JSON.parse(document.getElementById("book-data").textContent);
  var screensEl = document.getElementById("screens");
  var homeBtn = document.getElementById("homeBtn");
  var dysToggle = document.getElementById("dysToggle");
  var dysPanel = document.getElementById("dysPanel");

  var STORAGE_KEY = "storylines_progress_v1";

  function loadState(){
    try{
      var raw = window.localStorage.getItem(STORAGE_KEY);
      if(!raw){ return {books:{}, xp:0, badges:[], settings:{}}; }
      var parsed = JSON.parse(raw);
      if(!parsed.books){ parsed.books = {}; }
      if(typeof parsed.xp !== "number"){ parsed.xp = 0; }
      if(!parsed.badges){ parsed.badges = []; }
      if(!parsed.settings){ parsed.settings = {}; }
      return parsed;
    }catch(e){
      return {books:{}, xp:0, badges:[], settings:{}};
    }
  }

  function saveState(){
    try{
      window.localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }catch(e){ /* storage unavailable, continue silently */ }
  }

  var state = loadState();

  function getBook(id){
    for(var i=0;i<DATA.books.length;i++){
      if(DATA.books[i].id === id){ return DATA.books[i]; }
    }
    return null;
  }
  function getLine(id){
    for(var i=0;i<DATA.lines.length;i++){
      if(DATA.lines[i].id === id){ return DATA.lines[i]; }
    }
    return null;
  }
  function bookState(bookId){
    if(!state.books[bookId]){
      state.books[bookId] = {endingsFound:[], visited:[]};
    }
    return state.books[bookId];
  }

  function awardXP(n){
    state.xp += n;
  }
  function totalEndingsFound(){
    var n = 0;
    for(var k in state.books){
      if(state.books.hasOwnProperty(k)){ n += state.books[k].endingsFound.length; }
    }
    return n;
  }
  function booksStarted(){
    var n = 0;
    for(var k in state.books){
      if(state.books.hasOwnProperty(k) && state.books[k].visited.length > 0){ n++; }
    }
    return n;
  }
  function maybeAwardBadges(){
    if(booksStarted() >= 1 && state.badges.indexOf("first_journey") === -1){
      state.badges.push("first_journey");
    }
    if(booksStarted() >= 2 && state.badges.indexOf("explorer") === -1){
      state.badges.push("explorer");
    }
  }

  /* ---------------- routing ---------------- */
  var route = {screen:"home"};

  function go(next){
    if("speechSynthesis" in window){ window.speechSynthesis.cancel(); }
    speaking = false;
    route = next;
    render();
    window.scrollTo(0,0);
  }

  homeBtn.addEventListener("click", function(){ go({screen:"home"}); });

  /* ---------------- dys panel ---------------- */
  var dysOpen = false;
  dysToggle.addEventListener("click", function(){
    dysOpen = !dysOpen;
    dysPanel.className = dysOpen ? "dys-panel open" : "dys-panel";
  });
  document.getElementById("fontToggle").addEventListener("click", function(e){
    document.body.classList.toggle("dys");
    e.target.classList.toggle("active");
    state.settings.dys = document.body.classList.contains("dys");
    saveState();
  });
  document.getElementById("contrastToggle").addEventListener("click", function(e){
    document.body.classList.toggle("contrast");
    e.target.classList.toggle("active");
    state.settings.contrast = document.body.classList.contains("contrast");
    saveState();
  });
  document.getElementById("letterspaceToggle").addEventListener("click", function(e){
    document.body.classList.toggle("letterspace");
    e.target.classList.toggle("active");
    state.settings.letterspace = document.body.classList.contains("letterspace");
    saveState();
  });
  document.getElementById("linespaceToggle").addEventListener("click", function(e){
    document.body.classList.toggle("linespace");
    e.target.classList.toggle("active");
    state.settings.linespace = document.body.classList.contains("linespace");
    saveState();
  });
  document.getElementById("bionicToggle").addEventListener("click", function(e){
    state.settings.bionic = !state.settings.bionic;
    e.target.classList.toggle("active", state.settings.bionic);
    saveState();
    if(route.screen === "reader"){ render(); }
  });
  document.getElementById("ttsToggle").addEventListener("click", function(){
    toggleReadAloud();
  });
  var sizeBtns = dysPanel.querySelectorAll("[data-size]");
  for(var s=0;s<sizeBtns.length;s++){
    sizeBtns[s].addEventListener("click", function(e){
      var size = e.target.getAttribute("data-size");
      document.body.classList.remove("font-a","font-b","font-c","font-d");
      document.body.classList.add("font-" + size);
      for(var j=0;j<sizeBtns.length;j++){ sizeBtns[j].classList.remove("active"); }
      e.target.classList.add("active");
      state.settings.fontSize = size;
      saveState();
    });
  }
  var overlayBtns = dysPanel.querySelectorAll("[data-overlay]");
  for(var ov=0; ov<overlayBtns.length; ov++){
    overlayBtns[ov].addEventListener("click", function(e){
      var overlay = e.currentTarget.getAttribute("data-overlay");
      document.body.classList.remove("overlay-cream","overlay-blue","overlay-yellow","overlay-grey");
      document.body.classList.add("overlay-" + overlay);
      for(var j=0;j<overlayBtns.length;j++){ overlayBtns[j].classList.remove("active"); }
      e.currentTarget.classList.add("active");
      state.settings.overlay = overlay;
      saveState();
    });
  }

  /* ---------------- text-to-speech (read aloud) ---------------- */
  function bionicWord(word){
    var len = word.length;
    if(len <= 1){ return "<b>" + word + "</b>"; }
    var boldLen = Math.ceil(len * 0.45);
    return "<b>" + word.substr(0, boldLen) + "</b>" + word.substr(boldLen);
  }
  function bionicize(container){
    var walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, null, false);
    var textNodes = [];
    var n;
    while((n = walker.nextNode())){ textNodes.push(n); }
    for(var i=0;i<textNodes.length;i++){
      var tn = textNodes[i];
      var text = tn.nodeValue;
      if(!text || !text.replace(/\s/g,"").length){ continue; }
      var parts = text.split(/(\s+)/);
      var out = "";
      for(var p=0;p<parts.length;p++){
        var part = parts[p];
        if(part === "" || /^\s+$/.test(part)){ out += part; continue; }
        out += bionicWord(part);
      }
      var span = document.createElement("span");
      span.innerHTML = out;
      if(tn.parentNode){ tn.parentNode.replaceChild(span, tn); }
    }
  }
  var speaking = false;
  function stripHtml(html){
    var tmp = document.createElement("div");
    tmp.innerHTML = html;
    return tmp.textContent || tmp.innerText || "";
  }
  function toggleReadAloud(){
    if(!("speechSynthesis" in window)){ return; }
    if(speaking){
      window.speechSynthesis.cancel();
      speaking = false;
      updateTtsButtons();
      return;
    }
    var book = getBook(route.bookId);
    if(!book){ return; }
    var node = book.nodes[route.nodeId];
    if(!node){ return; }
    var text = stripHtml(node.text);
    var utter = new SpeechSynthesisUtterance(text);
    utter.lang = "en-GB";
    utter.rate = 0.95;
    utter.onend = function(){ speaking = false; updateTtsButtons(); };
    utter.onerror = function(){ speaking = false; updateTtsButtons(); };
    window.speechSynthesis.cancel();
    window.speechSynthesis.speak(utter);
    speaking = true;
    updateTtsButtons();
  }
  function updateTtsButtons(){
    var longBtns = document.querySelectorAll(".dys-tts-btn");
    var shortBtns = document.querySelectorAll(".reader-tts-btn");
    var i;
    for(i=0;i<longBtns.length;i++){
      longBtns[i].textContent = speaking ? "\u23F9 Arrêter la lecture" : "\uD83D\uDD0A Lire cette page à voix haute";
      longBtns[i].classList.toggle("active", speaking);
    }
    for(i=0;i<shortBtns.length;i++){
      shortBtns[i].textContent = speaking ? "\u23F9 Stop" : "\uD83D\uDD0A Écouter";
      shortBtns[i].classList.toggle("active", speaking);
    }
  }

  function applySavedSettings(){
    if(state.settings.dys){
      document.body.classList.add("dys");
      document.getElementById("fontToggle").classList.add("active");
    }
    if(state.settings.contrast){
      document.body.classList.add("contrast");
      document.getElementById("contrastToggle").classList.add("active");
    }
    if(state.settings.letterspace){
      document.body.classList.add("letterspace");
      document.getElementById("letterspaceToggle").classList.add("active");
    }
    if(state.settings.linespace){
      document.body.classList.add("linespace");
      document.getElementById("linespaceToggle").classList.add("active");
    }
    if(state.settings.bionic){
      document.getElementById("bionicToggle").classList.add("active");
    }
    var fs = state.settings.fontSize || "b";
    document.body.classList.add("font-" + fs);
    for(var j=0;j<sizeBtns.length;j++){
      sizeBtns[j].classList.remove("active");
      if(sizeBtns[j].getAttribute("data-size") === fs){ sizeBtns[j].classList.add("active"); }
    }
    var ovl = state.settings.overlay || "cream";
    document.body.classList.add("overlay-" + ovl);
    for(var k=0;k<overlayBtns.length;k++){
      overlayBtns[k].classList.remove("active");
      if(overlayBtns[k].getAttribute("data-overlay") === ovl){ overlayBtns[k].classList.add("active"); }
    }
  }

  function statCard(num, label){
    return "<div class=\"stat-card\"><div class=\"stat-num\">" + num + "</div><div class=\"stat-label\">" + label + "</div></div>";
  }

  function stationCard(book, line){
    var bs = bookState(book.id);
    var total = countEndings(book);
    var complete = bs.endingsFound.length >= total;
    var inProgress = bs.visited.length > 0 && !complete;
    var html = "<div class=\"book-spine\" data-book=\"" + book.id + "\" style=\"background:" + line.hex + "\">";
    html += "  <div class=\"spine-rule top\"></div>";
    if(inProgress){ html += "  <div class=\"spine-ribbon\"></div>"; }
    html += "  <div class=\"spine-title\">" + book.title + "</div>";
    html += "  <div class=\"spine-rule bottom\"></div>";
    if(complete){ html += "  <div class=\"spine-seal\">★</div>"; }
    html += "</div>";
    return html;
  }

  function stationComingSoon(){
    var html = "<div class=\"book-spine empty\">";
    html += "  <div class=\"spine-title\">Bientôt</div>";
    html += "</div>";
    return html;
  }

  function countEndings(book){
    var n = 0;
    for(var k in book.nodes){
      if(book.nodes.hasOwnProperty(k) && book.nodes[k].ending){ n++; }
    }
    return n;
  }

  /* ---------------- book detail (pulled off the shelf) ---------------- */
  function renderDetail(){
    homeBtn.classList.remove("hidden");
    var book = getBook(route.bookId);
    var line = getLine(book.level);
    var bs = bookState(book.id);
    var total = countEndings(book);
    var started = bs.visited.length > 0;

    var html = "";
    html += "<div class=\"reader-top\">";
    html += "  <button class=\"back-link\" id=\"toLibrary\">← Étagère</button>";
    html += "</div>";
    html += "<div class=\"detail-wrap\">";
    html += "  <div class=\"detail-cover\" style=\"background:" + line.hex + "\">";
    html += "    <div class=\"spine-rule top\"></div>";
    html += "    <div class=\"detail-eyebrow\">" + line.name + " · " + book.cecrl + "</div>";
    html += "    <div class=\"detail-title\">" + book.title + "</div>";
    html += "    <div class=\"detail-title-fr\">" + book.titleFr + "</div>";
    html += "    <div class=\"detail-blurb\">" + book.blurb + "</div>";
    html += "    <div class=\"detail-pills\">";
    html += "      <span class=\"pill\">~" + book.estMinutes + " min</span>";
    html += "      <span class=\"pill\">" + bs.endingsFound.length + "/" + total + " fins trouvées</span>";
    html += "    </div>";
    html += "    <div class=\"spine-rule bottom\"></div>";
    html += "  </div>";
    html += "  <div class=\"detail-actions\">";
    html += "    <button class=\"btn-primary\" id=\"startBtn\">" + (started ? "Continuer la lecture" : "Commencer la lecture") + "</button>";
    if(started){ html += "    <button class=\"btn-secondary\" id=\"restartBtn\">Recommencer depuis le début</button>"; }
    html += "  </div>";
    html += "</div>";

    screensEl.innerHTML = html;
    document.getElementById("toLibrary").addEventListener("click", function(){ go({screen:"home"}); });
    document.getElementById("startBtn").addEventListener("click", function(){ startBook(route.bookId); });
    var restartBtn = document.getElementById("restartBtn");
    if(restartBtn){ restartBtn.addEventListener("click", function(){ startBook(route.bookId); }); }
  }

  /* ---------------- reader ---------------- */
  function startBook(bookId){
    var book = getBook(bookId);
    if(!book){ return; }
    go({screen:"reader", bookId:bookId, nodeId:book.start, path:[book.start]});
  }

  function renderReader(){
    homeBtn.classList.remove("hidden");
    var book = getBook(route.bookId);
    var line = getLine(book.level);
    var node = book.nodes[route.nodeId];
    document.documentElement.style.setProperty("--current-line", line.hex);

    var html = "";
    html += "<div class=\"reader-top\">";
    html += "  <button class=\"back-link\" id=\"toLibrary\">← Bibliothèque</button>";
    html += "  <button class=\"icon-btn reader-tts-btn\" id=\"readerTts\" style=\"width:auto;border-radius:20px;padding:0 12px;font-size:12px;float:right\">\uD83D\uDD0A Écouter</button>";
    html += "</div>";

    html += "<div class=\"progress-track\">";
    for(var i=0;i<route.path.length;i++){
      html += "<div class=\"progress-dot on\" style=\"--current-line:" + line.hex + ";background:" + line.hex + "\"></div>";
      if(i < route.path.length - 1){
        html += "<div class=\"progress-seg on\" style=\"background:" + line.hex + "\"></div>";
      }
    }
    html += "</div>";

    html += "<div class=\"page\">";
    html += "  <div class=\"page-card\">";
    html += "    <div class=\"eyebrow\" style=\"color:" + line.hex + "\">" + book.title.toUpperCase() + "</div>";
    html += "    <div class=\"page-text\" style=\"margin-top:10px\">" + node.text + "</div>";
    html += "  </div>";
    html += "</div>";

    if(node.ending){
      go({screen:"ending", bookId:route.bookId, endingKey:node.ending.id, endingData:node.ending, path:route.path});
      return;
    } else {
      html += "<div class=\"choices\">";
      for(var c=0;c<node.choices.length;c++){
        html += "<button class=\"choice-btn\" data-to=\"" + node.choices[c].to + "\" style=\"--current-line:" + line.hex + "\">";
        html += "<span class=\"choice-arrow\">→</span><span>" + node.choices[c].label + "</span>";
        html += "</button>";
      }
      html += "</div>";
    }

    screensEl.innerHTML = html;

    document.getElementById("toLibrary").addEventListener("click", function(){ go({screen:"home"}); });
    var readerTtsBtn = document.getElementById("readerTts");
    if(readerTtsBtn){
      readerTtsBtn.addEventListener("click", function(){ toggleReadAloud(); });
      updateTtsButtons();
    }

    if(state.settings.bionic){
      var pageTextEl = screensEl.querySelector(".page-text");
      if(pageTextEl){ bionicize(pageTextEl); }
    }

    var gws = screensEl.querySelectorAll(".gw");
    for(var g=0; g<gws.length; g++){
      var def = gws[g].getAttribute("data-def");
      var emoji = gws[g].getAttribute("data-emoji");
      var tip = document.createElement("span");
      tip.className = "gw-tip";
      var emojiEl = document.createElement("span");
      emojiEl.className = "gw-emoji";
      emojiEl.textContent = emoji || "\uD83D\uDCD6";
      var defEl = document.createElement("span");
      defEl.className = "gw-def";
      defEl.textContent = def || "";
      tip.appendChild(emojiEl);
      tip.appendChild(defEl);
      gws[g].appendChild(tip);
      gws[g].addEventListener("click", function(ev){
        ev.stopPropagation();
        var target = ev.currentTarget;
        var wasOpen = target.classList.contains("open");
        var all = screensEl.querySelectorAll(".gw");
        for(var a=0;a<all.length;a++){ all[a].classList.remove("open"); }
        if(!wasOpen){ target.classList.add("open"); }
      });
    }

    var btns = screensEl.querySelectorAll(".choice-btn");
    for(var b2=0;b2<btns.length;b2++){
      btns[b2].addEventListener("click", function(ev){
        var to = ev.currentTarget.getAttribute("data-to");
        var newPath = route.path.concat([to]);
        var bs = bookState(route.bookId);
        if(bs.visited.indexOf(to) === -1){ bs.visited.push(to); }
        saveState();
        go({screen:"reader", bookId:route.bookId, nodeId:to, path:newPath});
      });
    }
  }

  /* ---------------- ending ---------------- */
  function renderEnding(){
    homeBtn.classList.remove("hidden");
    var book = getBook(route.bookId);
    var line = getLine(book.level);
    var ending = route.endingData;
    document.documentElement.style.setProperty("--current-line", line.hex);

    var bs = bookState(route.bookId);
    var isNew = bs.endingsFound.indexOf(ending.id) === -1;
    if(isNew){
      bs.endingsFound.push(ending.id);
      awardXP(ending.xp);
      var total = countEndings(book);
      if(bs.endingsFound.length >= total && state.badges.indexOf("complete_" + book.id) === -1){
        state.badges.push("complete_" + book.id);
      }
      maybeAwardBadges();
      saveState();
    }

    var emojiMap = {good:"🌟", best:"🏆", neutral:"🧭", bad:"🌊", funny:"😅"};
    var emoji = emojiMap[ending.type] || "📖";
    var tagMap = {good:"Bonne fin", best:"Meilleure fin", neutral:"Fin neutre", bad:"Fin difficile", funny:"Fin amusante"};

    var html = "";
    html += "<div class=\"ending-wrap\">";
    html += "  <div class=\"the-end\">THE END</div>";
    html += "  <div class=\"ending-tag\">" + tagMap[ending.type] + "</div>";
    html += "  <div class=\"ending-title\">" + ending.title + "</div>";
    html += "  <div class=\"ending-title-fr\">" + ending.titleFr + "</div>";
    html += "  <div class=\"ending-badge\" style=\"--current-line:" + line.hex + ";border-color:" + line.hex + "\">" + emoji + "</div>";
    html += "  <div class=\"ending-xp\">" + (isNew ? "+" + ending.xp + " XP" : "Déjà découverte — 0 XP") + "</div>";
    html += "  <div class=\"endings-found\">" + bs.endingsFound.length + " / " + countEndings(book) + " fins découvertes dans ce livre</div>";
    html += "  <div class=\"ending-actions\">";
    html += "    <button class=\"btn-primary\" id=\"replayBtn\">Recommencer ce livre</button>";
    html += "    <button class=\"btn-secondary\" id=\"libraryBtn\">Retour à la bibliothèque</button>";
    html += "  </div>";
    html += "</div>";

    screensEl.innerHTML = html;
    document.getElementById("replayBtn").addEventListener("click", function(){ startBook(route.bookId); });
    document.getElementById("libraryBtn").addEventListener("click", function(){ go({screen:"home"}); });
  }

  /* ---------------- master render ---------------- */
  function render(){
    if(route.screen === "home"){ renderHome(); }
    else if(route.screen === "detail"){ renderDetail(); }
    else if(route.screen === "reader"){ renderReader(); }
    else if(route.screen === "ending"){ renderEnding(); }
  }

  applySavedSettings();
  render();
})();
</script>
</body>
</html>
